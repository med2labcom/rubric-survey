      {
        id:"5-4", label_en:"Rubric 4", label_ko:"기준표 4", d1pts:50, d2pts:50,
        d1desc_en:"This domain evaluates core history-taking skills applicable across all pediatric emergency presentations.",
        d1desc_ko:"이 영역은 모든 소아 응급 상황에 적용 가능한 핵심 병력 청취 기술을 평가합니다.",
        d2desc_en:"This domain evaluates case-specific diagnostic history for acute appendicitis in an adolescent.",
        d2desc_ko:"이 영역은 청소년에서 급성 충수염에 대한 사례 특이적 진단 병력을 평가합니다.",
        d1:[
          {id:"5-4-1-1",pts:5,en:"Item 1. Chief Complaint: Clearly elicits and articulates the primary presenting problem(s) in patient's/family's own words.",ko:"항목 1. 주호소(Chief Complaint): 환자 또는 보호자의 표현을 바탕으로 주요 증상 을 명확히 확인하고 정리한다.",xEn:"Establishes encounter focus; foundational and routinely expected, modest weight.",xKo:"진료의 초점을 설정하는 기본 단계로, 모든 임상 면담에서 필수적으로 수행되어야 한다. 기초적이지만 중요한 요소이므로 비교적 낮은 가중치를 부여하였다."},
          {id:"5-4-1-2",pts:12,en:"Item 2. History of Presenting Illness: Systematically explores onset, timing, duration, severity, progression, aggravating/alleviating factors, and associated symptoms using a structured approach (e.g., OPQRST).",ko:"항목 2. 현병력(History of Presenting Illness): OPQRST와 같은 구조화된 접근 을 사용하여 증상의 시작 시점, 발생 시기, 지속 시간, 중증도, 진행 양상, 악화/완화 요 인, 동반 증상을 체계적으로 탐색한다.",xEn:"Captures illness trajectory for urgency in pediatric EM; core to all differentials, highest general weight.",xKo:"소아 응급의학에서 질병의 경과와 긴급도를 파악하는 데 핵심적인 요소이며, 모든 감별 진단의 기초가 된다. 일반 병력 영역에서 가장 중요한 항목이므로 가장 높은 가중 치를 부여하였다."},
          {id:"5-4-1-3",pts:7,en:"Item 3. Past Medical History: Inquires about chronic illnesses, prior hospitalizations, surgeries, birth/developmental history, and previous similar episodes.",ko:"항목 3. 과거 병력(Past Medical History): 만성 질환, 이전 입원 및 수술 병력, 출 생 및 발달 병력, 그리고 이전에 유사한 증상이 있었는지 여부를 확인한다.",xEn:"Identifies risks or patterns affecting management; moderate for baseline stratification.",xKo:"치료 계획에 영향을 줄 수 있는 위험 요인이나 질병의 패턴을 파악하는 데 도움이 되며, 환자의 기본 상태를 평가하는 데 중요하다. 기초적인 위험도 층화를 위해 중간 수 준의 가중치를 부여하였다."},
          {id:"5-4-1-4",pts:4,en:"Item 4. Medications: Documents current prescriptions, over-the-counter drugs, recent antibiotics, and adherence.",ko:"항목 4. 복용 약물(Medications): 현재 복용 중인 처방약, 일반의약품(OTC), 최근 항생제 사용 여부, 그리고 약물 복용 순응도를 확인한다.",xEn:"Guides therapy and avoids interactions; straightforward, low weight.",xKo:"치료 계획 수립에 도움을 주고 약물 상호작용을 예방하기 위해 필요한 기본 정보 이다. 비교적 단순한 확인 항목이므로 낮은 가중치를 부여하였다."},
          {id:"5-4-1-5",pts:4,en:"Item 5. Allergies: Asks about drug/food allergies, adverse reactions, and anaphylaxis history.",ko:"항목 5. 알레르기(Allergies): 약물 및 음식 알레르기 여부, 과거 부작용 반응, 아나필 락시스 병력을 확인한다.",xEn:"Ensures prescribing safety; low weight paired with medications.",xKo:"약물 처방 시 환자 안전을 확보하기 위한 기본적인 확인 사항이다. 약물 병력과 함 께 확인되는 항목으로, 상대적으로 낮은 가중치를 부여하였다."},
          {id:"5-4-1-6",pts:4,en:"Item 6. Immunizations: Confirms status, recent vaccines, and gaps relevant to infectious risks.",ko:"항목 6. 예방접종(Immunizations): 예방접종 상태, 최근 접종 여부, 그리고 감염 위 험과 관련된 접종 누락 여부를 확인한다.",xEn:"Critical in pediatrics for context; low as often documented.",xKo:"소아 진료에서 중요한 배경 정보이지만, 일반적으로 의료 기록에 이미 문서화되어 있는 경우가 많다. 이러한 이유로 낮은 가중치를 부여하였다."},
          {id:"5-4-1-7",pts:5,en:"Item 7. Family History: Explores hereditary conditions and relevant familial illnesses.",ko:"항목 7. 가족력(Family History): 유전성 질환과 임상적으로 관련될 수 있는 가족 내 질환 여부를 확인한다.",xEn:"Uncovers genetic risks; pediatric-relevant, moderate weight.",xKo:"유전적 위험 요인이나 가족 내 질환 패턴을 파악하는 데 도움이 되며, 소아 환자 평가에서 임상적으로 의미 있는 정보를 제공할 수 있다. 이러한 이유로 중간 수준의 가 중치를 부여하였다."},
          {id:"5-4-1-8",pts:4,en:"Item 8. Social History: Assesses home environment, caregivers, school/daycare/nursery exposure, and habits.",ko:"항목 8. 사회력(Social History): 가정 환경, 주 보호자, 학교/어린이집/유치원 노출, 생활 습관 등을 확인한다.",xEn:"Contextualizes adherence/exposures; supportive, low weight.",xKo:"치료 순응도나 감염 노출 가능성 등 환자의 임상 상황을 이해하는 데 도움이 되는 배경 정보를 제공한다. 보조적인 역할을 하는 항목이므로 낮은 가중치를 부여하였다."},
          {id:"5-4-1-9",pts:5,en:"Item 9. Review of Systems: Performs age-appropriate screening for unrelated symptoms.",ko:"항목 9. 계통별 문진(Review of Systems): 연령에 적절한 방식으로 현재 주증상과 직접 관련되지 않은 증상들을 선별적으로 확인한다.",xEn:"Safety net for comorbidities; moderate for comprehensiveness.",xKo:"동반 질환이나 놓칠 수 있는 다른 임상 문제를 발견하기 위한 안전 장치 역할을 한 다. 병력 청취의 포괄성을 확보하는 데 중요하므로 중간 수준의 가중치를 부여하였다."},

// ─── PART A SCREEN ───────────────────────────────────────────────────────────
function PartAScreen({ caseData, rubric, onNext, onBack }) {
  const lang = useLang();
  const t = (en,ko) => T(en,ko,lang);
  const [partA, setPartA] = useState({});
  const [comments, setComments] = useState({});

  const allItems = [...rubric.d1, ...rubric.d2];
  const totalItems = allItems.length;
  const answeredItems = Object.keys(partA).length;
  const allAnswered = answeredItems === totalItems;
  const itemRefs = React.useRef({});
  const [highlightId, setHighlightId] = useState(null);

  const goToFirst = () => {
    const firstMissing = allItems.find(item => partA[item.id] === undefined);
    if (!firstMissing) return;
    setHighlightId(firstMissing.id);
    const el = itemRefs.current[firstMissing.id];
    if (el) { el.scrollIntoView({behavior:"smooth", block:"center"}); }
    setTimeout(() => setHighlightId(null), 5000);
  };

  const ItemRow = ({item, idx, showTop}) => {
    const ans = partA[item.id];
    const raw = t(item.en, item.ko);
    // Split on first colon: "Item N. Name: description" → bold name + normal body
    const colonIdx = raw.indexOf(": ");
    const lbl = colonIdx > -1 ? raw.slice(0, colonIdx) : raw;
    const body = colonIdx > -1 ? raw.slice(colonIdx+2) : "";
    const isHighlighted = highlightId === item.id;
    return h('div',{ref: el => { itemRefs.current[item.id] = el; },
      style:{
      padding:"20px 22px",
      borderTop: showTop ? "1px solid "+cardBd : "none",
      background: isHighlighted ? "#FFF3CD" : ans===true ? greenBg : ans===false ? redBg : white,
      outline: isHighlighted ? "2px solid #F59E0B" : "none",
      outlineOffset: "-2px",
      transition:"background 0.3s, outline 0.3s"}},
      isHighlighted && h('p',{style:{fontSize:12,fontWeight:700,color:"#92400e",
        margin:"0 0 8px",display:"flex",alignItems:"center",gap:6}},
        "⚠ "+t("Please answer this item before continuing.","계속하기 전에 이 항목에 답해 주세요.")),
      h('p',{style:{fontSize:14,fontWeight:700,color:navy,lineHeight:1.4,margin:"0 0 4px"}},lbl),
      body && h('p',{style:{fontSize:13,color:txt,lineHeight:1.65,margin:"0 0 14px"}},body),
      h('div',{style:{
        background: ans===true?"#dcfce7" : ans===false?"#fee2e2" : "#F0F4FA",
        border:"1px solid "+(ans===true?greenBd:ans===false?redBd:cardBd),
        borderRadius:8,padding:"10px 14px",marginBottom:14}},
        h('p',{style:{fontSize:12,fontWeight:700,
          color:ans===true?green:ans===false?red:muted,
          textTransform:"uppercase",letterSpacing:"0.05em",margin:"0 0 4px"}},
          t("Explanation","설명")),
        h('p',{style:{fontSize:13,color:ans===true?"#14532d":ans===false?"#4c0519":"#374151",
          lineHeight:1.65,margin:0}},t(item.xEn,item.xKo))),
      h('div',{style:{display:"flex",gap:10,marginBottom:ans!==undefined?12:0}},
        h('button',{onClick:()=>setPartA(p=>({...p,[item.id]:true})),
          style:{flex:1,padding:"11px 0",borderRadius:8,fontSize:14,fontWeight:600,
            border:"2px solid "+(ans===true?green:cardBd),
            background:ans===true?greenBg:white,color:ans===true?green:muted,
            cursor:"pointer",transition:"all 0.15s"}},
          "✓ "+t("Agree","동의")),
        h('button',{onClick:()=>setPartA(p=>({...p,[item.id]:false})),
          style:{flex:1,padding:"11px 0",borderRadius:8,fontSize:14,fontWeight:600,
            border:"2px solid "+(ans===false?red:cardBd),
            background:ans===false?redBg:white,color:ans===false?red:muted,
            cursor:"pointer",transition:"all 0.15s"}},
          "✗ "+t("Disagree","비동의"))),
      ans!==undefined && h('textarea',{
        placeholder:t("Optional comment for this item…","이 항목에 대한 선택적 의견…"),
        value:comments[item.id]||"",
        onChange:e=>setComments(c=>({...c,[item.id]:e.target.value})),
        style:{width:"100%",padding:"9px 12px",fontSize:14,
          border:"1px solid "+cardBd,borderRadius:8,resize:"vertical",
          fontFamily:ffs,boxSizing:"border-box",minHeight:60,
          background:"rgba(255,255,255,0.8)"}})
    );
  };

  const Domain = ({items, label, desc, pts}) =>
    h('div',{style:{marginBottom:24}},
      h('div',{style:{background:navyL,border:"1px solid "+navyBd,
        borderRadius:"10px 10px 0 0",padding:"12px 20px",
        display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        h('div',{style:{flex:1}},
          h('p',{style:{fontSize:14,fontWeight:700,color:navy,margin:"0 0 3px"}},label),
          desc && h('p',{style:{fontSize:13,color:muted,margin:0,lineHeight:1.5}},desc)),
        h('span',{style:{fontSize:13,fontWeight:700,color:navyMid,flexShrink:0,marginLeft:12,marginTop:2}},
          pts+t(" pts"," 점"))),
      h('div',{style:{border:"1px solid "+cardBd,borderTop:"none",
        borderRadius:"0 0 10px 10px",overflow:"hidden"}},
        items.map((item,idx)=>h(ItemRow,{key:item.id,item,idx,showTop:idx>0})))
    );

  const d1label = t("Domain 1: General Clinical History-Taking","영역 1: 일반 임상 병력 청취");
  const d2label = t("Domain 2: Case-Specific Diagnostic History","영역 2: 사례별 진단 추론");

  return h('div',{style:{flex:1,minWidth:0}},
    h(Card,{style:{padding:"16px 22px",marginBottom:20,background:navyL,border:"1px solid "+navyBd,boxShadow:"none"}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}},
        h('div',null,
          h('p',{style:{fontSize:16,fontWeight:700,color:navy,margin:"0 0 4px"}},
            t(rubric.label_en,rubric.label_ko)+" — "+t("Part A","파트 A")),
          h('p',{style:{fontSize:13,color:muted,margin:0}},
            t("Select Agree or Disagree for each item. You may add an optional comment.",
              "각 항목에 동의 또는 비동의를 선택하세요. 선택적 의견을 추가할 수 있습니다."))),
        h('div',{style:{textAlign:"right",flexShrink:0}},
          h('p',{style:{fontSize:11,color:muted,margin:"0 0 2px"}},t("Total","총점")),
          h('p',{style:{fontSize:18,fontWeight:700,color:navyMid,margin:0}},
            (rubric.d1pts+rubric.d2pts)+t(" pts"," 점")))),
      (rubric.threshold_en||rubric.rationale_en) &&
        h('div',{style:{background:amberBg,border:"1px solid "+amberBd,
          borderRadius:8,padding:"10px 14px",marginTop:14,
          display:"flex",gap:10,alignItems:"flex-start"}},
          h('span',{style:{fontSize:15,flexShrink:0}},"ℹ️"),
          h('p',{style:{fontSize:13,color:"#78350f",lineHeight:1.65,margin:0}},
            t(rubric.threshold_en||rubric.rationale_en,
              rubric.threshold_ko||rubric.rationale_ko)))
    ),
    h(Domain,{items:rubric.d1,label:d1label,desc:'',pts:rubric.d1pts}),
    h(Domain,{items:rubric.d2,label:d2label,desc:'',pts:rubric.d2pts}),
    h('div',{style:{display:"flex",gap:12,alignItems:"center"}},
      onBack && h('button',{onClick:onBack,
        style:{padding:"14px 20px",borderRadius:10,border:"2px solid "+navy,
          background:white,color:navy,fontSize:15,fontWeight:600,
          cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}},
        "← "+t("Back","이전")),
      h(PrimaryBtn,{
        onClick:()=>{ if(allAnswered){ onNext({partA,comments}); } else { goToFirst(); } }},
        t("Continue to Part B →","파트 B로 계속 →"))
    )
  );
}

// ─── PART B SCREEN ───────────────────────────────────────────────────────────
function PartBScreen({ caseData, rubric, ci, ri, isLast, onSubmit, partAData, onBack }) {
  const lang = useLang();
  const t = (en,ko) => T(en,ko,lang);
  const [d1Order, setD1Order] = useState(()=>[...rubric.d1].sort((a,b)=>b.pts-a.pts).map(i=>i.id));
  const [d2Order, setD2Order] = useState(()=>[...rubric.d2].sort((a,b)=>b.pts-a.pts).map(i=>i.id));
  const [finalCmt, setFinalCmt] = useState("");
  const moveItem = (order, setOrder, idx, dir) => {
    const next=[...order]; const to=idx+dir;
    if(to<0||to>=next.length) return;
    [next[idx],next[to]]=[next[to],next[idx]];
    setOrder(next);
  };

  // Next button label — no "submit", just navigation
  const nextLabel = () => {
    if(isLast) return t("Finish Survey →","설문 완료 →");
    const nr=ri+1;
    const nrInCase = nr < caseData.rubrics.length;
    if(nrInCase) return t("Next Rubric →","다음 기준표 →");
    return t("Next Case →","다음 사례 →");
  };

  const SortableList = ({items, order, setOrder}) => {
    const [dragging, setDragging] = React.useState(null);
    const [overIdx, setOverIdx]   = React.useState(null);
    const itemEls = React.useRef({});
    // Keep latest dragging/overIdx in refs so window handlers can read current values
    const draggingRef = React.useRef(null);
    const overIdxRef  = React.useRef(null);
    const orderRef    = React.useRef(order);
    React.useEffect(() => { orderRef.current = order; }, [order]);

    const computeOverIdx = (clientY, snaps, fromIdx) => {
      let bestIdx = fromIdx, bestDist = Infinity;
      orderRef.current.forEach((id2, i) => {
        const snap = snaps[id2];
        if(!snap) return;
        const mid = snap.top + snap.height / 2;
        const dist = Math.abs(clientY - mid);
        if(dist < bestDist) { bestDist = dist; bestIdx = i; }
      });
      return bestIdx;
    };

    const onPointerDown = (e, id) => {
      if(e.button !== undefined && e.button !== 0) return;
      const el = itemEls.current[id];
      const rect = el ? el.getBoundingClientRect() : {top:0, height:60};
      const grabOffsetY = e.clientY - rect.top;
      const snaps = {};
      Object.entries(itemEls.current).forEach(([id2, el2]) => {
        if(el2) { const r = el2.getBoundingClientRect(); snaps[id2] = {top:r.top, height:r.height}; }
      });
      const fromIdx = orderRef.current.indexOf(id);
      const drag = {id, startY:e.clientY, currentY:e.clientY,
        height:rect.height, grabOffsetY, snaps, fromIdx};
      draggingRef.current = drag;
      overIdxRef.current  = fromIdx;
      setDragging(drag);
      setOverIdx(fromIdx);
      e.preventDefault();
    };

    // Attach move/up to window so coordinates are always raw viewport
    React.useEffect(() => {
      const onMove = (e) => {
        const drag = draggingRef.current;
        if(!drag) return;
        const clientY = e.clientY !== undefined ? e.clientY : e.touches?.[0]?.clientY;
        if(clientY === undefined) return;
        const updated = {...drag, currentY: clientY};
        draggingRef.current = updated;
        setDragging(updated);
        const newOver = computeOverIdx(clientY, drag.snaps, drag.fromIdx);
        overIdxRef.current = newOver;
        setOverIdx(newOver);
      };
      const onUp = () => {
        const drag = draggingRef.current;
        const oi   = overIdxRef.current;
        if(!drag) return;
        if(oi !== null && oi !== drag.fromIdx) {
          setOrder(prev => {
            const next = [...prev];
            next.splice(drag.fromIdx, 1);
            next.splice(oi, 0, drag.id);
            return next;
          });
        }
        draggingRef.current = null;
        overIdxRef.current  = null;
        setDragging(null);
        setOverIdx(null);
      };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup',   onUp);
      return () => {
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup',   onUp);
      };
    }, []);

    const dy = dragging ? dragging.currentY - dragging.startY : 0;
    const dragIdx = dragging ? order.indexOf(dragging.id) : -1;

    return h('div', {style:{position:"relative"}},
      order.map((id, idx) => {
        const item = items.find(i => i.id === id); if(!item) return null;
        const raw = t(item.en, item.ko);
        // Split on first colon: "Item N. Name: description" → name + desc
        const colonIdx = raw.indexOf(": ");
        const lbl = colonIdx>-1 ? raw.slice(0, colonIdx) : raw;
        const desc = colonIdx>-1 ? raw.slice(colonIdx+2).trim() : "";
        const isDragging = dragging && dragging.id === id;
        // placeholder gap: show above/below based on overIdx
        const showGapAbove = dragging && !isDragging && overIdx === idx && dragIdx > idx;
        const showGapBelow = dragging && !isDragging && overIdx === idx && dragIdx < idx;
        return h('div', {key:id, style:{marginBottom:6}},
          // gap placeholder above
          showGapAbove && h('div', {style:{height:dragging.height+6, background:navyL,
            border:"2px dashed "+navyBd, borderRadius:8, marginBottom:6,
            transition:"height 0.1s"}}),
          // the actual item
          h('div', {
            ref: el => { itemEls.current[id] = el; },
            onPointerDown: e => onPointerDown(e, id),
            style:{
              display:"flex", alignItems:"flex-start", gap:10,
              padding:"12px 14px",
              background: isDragging ? navyL : white,
              border:"1px solid "+(isDragging ? navyBd : cardBd),
              borderRadius:8,
              boxShadow: isDragging
                ? "0 8px 24px rgba(27,43,94,0.22)"
                : "0 1px 3px rgba(0,0,0,0.05)",
              transform: isDragging ? "translate(0,"+dy+"px)" : "none",
              transition: isDragging ? "box-shadow 0.1s" : "transform 0.15s, box-shadow 0.15s",
              opacity: isDragging ? 0.95 : (dragging && !isDragging ? 0.6 : 1),
              cursor: isDragging ? "grabbing" : "grab",
              userSelect:"none",
              zIndex: isDragging ? 10 : 1,
              position: "relative",
              touchAction:"none"
            }},
            h('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",
              gap:4,flexShrink:0,paddingTop:4}},
              h('div',{style:{color:muted,fontSize:16,userSelect:"none",
                lineHeight:1,letterSpacing:"-1px"}},"⠿"),
              h('span',{style:{fontSize:12,fontWeight:700,color:navyMid,
                background:navyL,borderRadius:5,padding:"2px 6px",
                whiteSpace:"nowrap"}},"#"+(idx+1))),
            h('div',{style:{flex:1,paddingTop:2}},
              h('p',{style:{fontSize:14,color:navy,fontWeight:700,
                lineHeight:1.4,margin:"0 0 "+(desc?"3px":"0")}},lbl),
              desc && h('p',{style:{fontSize:13,color:muted,margin:0,lineHeight:1.5}},desc)),
            h('div',{style:{display:"flex",flexDirection:"column",gap:3,flexShrink:0,paddingTop:8}},
              h('button',{onClick:()=>moveItem(order,setOrder,idx,-1),disabled:idx===0,
                style:{padding:"3px 9px",fontSize:13,border:"1px solid "+cardBd,
                  borderRadius:5,background:white,cursor:"pointer",
                  opacity:idx===0?0.25:1,lineHeight:1.2}},"▲"),
              h('button',{onClick:()=>moveItem(order,setOrder,idx,1),
                disabled:idx===order.length-1,
                style:{padding:"3px 9px",fontSize:13,border:"1px solid "+cardBd,
                  borderRadius:5,background:white,cursor:"pointer",
                  opacity:idx===order.length-1?0.25:1,lineHeight:1.2}},"▼"))
          ),
          // gap placeholder below
          showGapBelow && h('div', {style:{height:dragging.height+6, background:navyL,
            border:"2px dashed "+navyBd, borderRadius:8, marginTop:0,
            transition:"height 0.1s"}})
        );
      })
    );
  };

  const DomainRank = ({items, order, setOrder, label}) =>
    h('div',{style:{marginBottom:28}},
      h('div',{style:{background:navyL,border:"1px solid "+navyBd,
        borderRadius:"10px 10px 0 0",padding:"12px 20px"}},
        h('p',{style:{fontSize:14,fontWeight:700,color:navy,margin:0}},label)),
      h('div',{style:{border:"1px solid "+cardBd,borderTop:"none",
        borderRadius:"0 0 10px 10px",padding:"14px",background:"#FAFBFD"}},
        h(SortableList,{items,order,setOrder}))
    );

  return h('div',{style:{flex:1,minWidth:0}},
    h(Card,{style:{padding:"16px 22px",marginBottom:8,background:navyL,border:"1px solid "+navyBd,boxShadow:"none"}},
      h('p',{style:{fontSize:16,fontWeight:700,color:navy,margin:"0 0 6px"}},
        t(rubric.label_en,rubric.label_ko)+" — "+t("Part B","파트 B")),
      h('p',{style:{fontSize:13,color:muted,margin:0}},
        t("Drag and drop items to reorder, or use ▲ ▼ arrows.",
          "항목을 드래그하거나 ▲ ▼ 화살표로 순서를 바꾸세요."))
    ),
    h(DomainRank,{items:rubric.d1,order:d1Order,setOrder:setD1Order,
      label:t("Domain 1: General Clinical History-Taking","영역 1: 일반 임상 병력 청취")}),
    h(DomainRank,{items:rubric.d2,order:d2Order,setOrder:setD2Order,
      label:t("Domain 2: Case-Specific Diagnostic History","영역 2: 사례별 진단 추론")}),
    h(Card,{style:{padding:"20px 22px",marginBottom:20}},
      h('p',{style:{fontSize:14,fontWeight:700,color:navy,margin:"0 0 10px"}},
        t("Overall Comment (optional)","전반적인 의견 (선택사항)")),
      h('textarea',{
        placeholder:t("Any comments or suggestions for this rubric?","이 루브릭에 대한 의견이나 제안이 있으신가요?"),
        value:finalCmt,onChange:e=>setFinalCmt(e.target.value),
        style:{width:"100%",padding:"12px 14px",fontSize:14,
          border:"1px solid "+cardBd,borderRadius:8,resize:"vertical",
          fontFamily:ffs,boxSizing:"border-box",minHeight:80}})
    ),
    h('div',{style:{display:"flex",gap:12,alignItems:"center"}},
      h('button',{onClick:onBack,
        style:{padding:"14px 20px",borderRadius:10,border:"2px solid "+navy,
          background:white,color:navy,fontSize:15,fontWeight:600,
          cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}},
        "← "+t("Back","이전")),
      h(PrimaryBtn,{
        onClick:()=>{ onSubmit(rubric.id,{...partAData,d1Order,d2Order,finalCmt}); scrollTop(); }},
        nextLabel())
    )
  );
}

// ─── DONE SCREEN (two states: pre-submit and post-submit) ─────────────────────
function DoneScreen({ responses, preSubmitState, onBack }) {
  const lang = useLang();
  const t = (en,ko) => T(en,ko,lang);
  // preSubmitState: if true, show pre-submit UI (used by preview)
  const [status, setStatus] = useState(preSubmitState ? "idle" : "idle");
  const [pid] = useState(()=>"P-"+Math.random().toString(36).slice(2,8).toUpperCase());
  const blob = new Blob([JSON.stringify(responses,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);

  const submit = async () => {
    setStatus("sending");
    try {
      const rows=[];
      for(const [rubricId,rd] of Object.entries(responses)){
        const parts=rubricId.split("-");
        const caseNo=parseInt(parts[0]), rubricNo=parseInt(parts[1]);
        const rubricLabel="C"+caseNo+"-R"+rubricNo; // e.g. "C1-R2" — unambiguous
        const base={participant_id:pid,lang,case_no:caseNo,rubric_no:rubricNo,
          rubric_id:rubricLabel,overall_comment:rd.finalCmt||""};
        // Agreement rows — one per item
        for(const [itemId,agreed] of Object.entries(rd.partA||{})){
          rows.push({...base,item_id:itemId,agreed,
            comment:(rd.comments||{})[itemId]||"",
            domain:null,rank:null});
        }
        // Ranking rows — one per item per domain
        (rd.d1Order||[]).forEach((itemId,i)=>{
          rows.push({...base,item_id:itemId,agreed:null,comment:"",
            domain:"d1",rank:i+1});
        });
        (rd.d2Order||[]).forEach((itemId,i)=>{
          rows.push({...base,item_id:itemId,agreed:null,comment:"",
            domain:"d2",rank:i+1});
        });
      }
      if(rows.length===0) return;
      const res=await fetch(SUPABASE_URL+"/rest/v1/responses",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,
          "Authorization":"Bearer "+SUPABASE_KEY,"Prefer":"return=minimal"},
        body:JSON.stringify(rows)
      });
      if(res.ok) { setStatus("success"); try{localStorage.removeItem(LS_KEY);}catch(e){} }
      else { console.error(await res.text()); setStatus("error"); }
    } catch(e){ console.error(e); setStatus("error"); }
  };

  // ── POST-SUBMIT (success) ───────────────────────────────────────────────────
  if(status==="success") return h(PageWrap,null,
    h('div',{style:{textAlign:"center",padding:"64px 0 48px"}},
      h('div',{style:{width:80,height:80,borderRadius:"50%",
        background:"linear-gradient(135deg,"+green+",#059669)",
        margin:"0 auto 28px",display:"flex",alignItems:"center",justifyContent:"center"}},
        h('svg',{width:38,height:38,viewBox:"0 0 24 24",fill:"none",
          stroke:white,strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"},
          h('path',{d:"M20 6L9 17l-5-5"}))),
      h('h1',{style:{fontSize:26,fontWeight:700,color:navy,margin:"0 0 14px",fontFamily:ffs}},
        t("Your responses have been recorded.","응답이 기록되었습니다.")),
      h('p',{style:{fontSize:15,color:muted,lineHeight:1.75,maxWidth:480,margin:"0 auto 32px"}},
        t("Thank you for completing this survey. Your clinical expertise and time are genuinely appreciated — responses like yours are what make this research meaningful.",
          "이 설문을 완료해 주셔서 감사합니다. 귀하의 임상 전문성과 시간은 진심으로 소중하며, 귀하와 같은 응답이 이 연구를 의미 있게 만들어 줍니다.")),
      h('p',{style:{fontSize:14,color:muted}},
        t("Participant ID: ","참여자 ID: "),
        h('strong',{style:{color:navy,marginLeft:4}},pid)),
      h('div',{style:{marginTop:24}},
        h('a',{href:url,download:"rubric_responses_"+pid+".json",
          style:{color:navyMid,fontSize:14,fontWeight:600,textDecoration:"underline"}},
          t("Download a copy of your responses","응답 사본 다운로드")))
    )
  );

  // ── PRE-SUBMIT (idle / sending / error) ─────────────────────────────────────
  return h(PageWrap,null,
    h('div',{style:{textAlign:"center",padding:"48px 0 36px"}},
      h('h1',{style:{fontSize:26,fontWeight:700,color:navy,margin:"0 0 12px",fontFamily:ffs}},
        t("You've reached the end of the survey.","설문의 끝에 도달하셨습니다.")),
      h('p',{style:{fontSize:15,color:muted,lineHeight:1.75,maxWidth:500,margin:"0 auto"}},
        t("When you're ready, click the button below to submit your responses.",
          "준비가 되시면 아래 버튼을 클릭하여 응답을 제출해 주세요."))
    ),
    h(Card,{style:{padding:"32px 36px"}},
      h('p',{style:{fontSize:14,color:muted,textAlign:"center",margin:"0 0 24px"}},
        t("Participant ID: ","참여자 ID: "),
        h('strong',{style:{color:navy,fontSize:15,marginLeft:4}},pid)),
      status==="idle" && h('div',null,
        h(PrimaryBtn,{onClick:submit},t("Submit Responses →","응답 제출 →")),
        h('div',{style:{textAlign:"center",marginTop:14}},
          h('button',{onClick:onBack,
            style:{background:"none",border:"none",color:muted,fontSize:14,
              cursor:"pointer",textDecoration:"underline",fontFamily:ffs}},
            "← "+t("Back to last rubric","마지막 루브릭으로 돌아가기")))
      ),
      status==="sending" && h('div',{style:{textAlign:"center",padding:"16px",
        background:navyL,borderRadius:10,color:navy,fontSize:15,fontWeight:600}},
        t("Sending…","전송 중…")),
      status==="error" && h('div',null,
        h('div',{style:{padding:"14px",marginBottom:14,background:redBg,
          border:"1px solid "+redBd,borderRadius:10,color:red,fontSize:14,textAlign:"center"}},
          t("Something went wrong with your submission. You can try submitting again, or download a backup copy of your responses and contact the research team.",
            "제출 중 문제가 발생했습니다. 다시 시도하거나, 응답 사본을 다운로드하여 연구팀에 연락해 주세요.")),
        h(PrimaryBtn,{onClick:submit},t("Try again →","다시 시도 →"))),
      h('div',{style:{borderTop:"1px solid "+cardBd,paddingTop:20,marginTop:24,
        textAlign:"center"}},
        h('a',{href:url,download:"rubric_responses_"+pid+".json",
          style:{color:muted,fontSize:13,textDecoration:"underline"}},
          "📥 "+t("Download a copy of your responses","응답 백업 사본 다운로드")))
    )
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
const LS_KEY = "rubric_survey_session_v1";

function App() {
  // ── Restore from localStorage if available ──────────────────────────────
  const saved = (() => { try { const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; } catch(e){return null;} })();

  const [lang, setLang] = useState(saved?.lang || "en");
  const [step, setStep] = useState(saved?.step || "consent");
  const [ci, setCi] = useState(saved?.ci || 0);
  const [ri, setRi] = useState(saved?.ri || 0);
  const [partAData, setPartAData] = useState(saved?.partAData || null);
  const [responses, setResponses] = useState(saved?.responses || {});

  const totalR = CASES.reduce((s,c)=>s+c.rubrics.length,0);
  const doneR  = CASES.slice(0,ci).reduce((s,c)=>s+c.rubrics.length,0)+ri;
  const curCase   = CASES[ci];
  const curRubric = curCase ? curCase.rubrics[ri] : null;

  // ── Autosave to localStorage on every state change ──────────────────────
  React.useEffect(() => {
    if (step === "consent") return; // don't save before they start
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({lang,step,ci,ri,partAData,responses}));
    } catch(e) {}
  }, [lang, step, ci, ri, partAData, responses]);

  const goPartB = useCallback((aData)=>{ setPartAData(aData); setStep("partB"); scrollTop(); },[]);
  const goBack = useCallback(()=>{
    // If on partA of a non-first rubric, go to partB of previous rubric
    if(ri > 0){ setRi(ri-1); setStep("partB"); scrollTop(); }
    else if(ci > 0){ setCi(ci-1); setRi(CASES[ci-1].rubrics.length-1); setStep("partB"); scrollTop(); }
    else { setStep("instr"); scrollTop(); }
  },[ci,ri]);
  const submitRubric = useCallback((id,data)=>{
    setResponses(r=>({...r,[id]:data}));
    const nr=ri+1;
    if(nr<curCase.rubrics.length){ setRi(nr); setStep("partA"); }
    else { const nc=ci+1; if(nc<CASES.length){setCi(nc);setRi(0);setStep("partA");}else setStep("done"); }
    scrollTop();
  },[ci,ri,curCase]);

  const breadcrumb = (step==="partA"||step==="partB") && curCase && curRubric
    ? h('span',null,
        T("Case "+(ci+1)+" of "+CASES.length,
          "사례 "+(ci+1)+"/"+CASES.length, lang),
        h('span',{style:{margin:"0 6px",color:muted}},"›"),
        h('strong',{style:{fontWeight:700}},
          T("Rubric "+(ri+1)+" of "+curCase.rubrics.length,
            "기준표 "+(ri+1)+"/"+curCase.rubrics.length, lang)))
    : null;

  const SL = ({children}) => h('div',{style:{maxWidth:1140,margin:"0 auto",
    padding:"28px 24px 80px",display:"flex",gap:24,alignItems:"flex-start"}},
    h(VignetteSidebar,{caseData:curCase}), children);

  return h(LangCtx.Provider,{value:lang},
    h('div',{style:{background:pageBg,minHeight:"100vh",fontFamily:ffs}},
      h(StickyHeader,{lang,setLang,doneR,totalR,breadcrumb}),
      step==="consent" && h(ConsentScreen,{onAgree:()=>{setStep("instr");scrollTop();}}),
      step==="instr"   && h(InstrScreen,{onStart:()=>{setStep("partA");scrollTop();}}),
      step==="partA" && curRubric && h(SL,null,
        h(PartAScreen,{key:"A-"+curRubric.id,caseData:curCase,rubric:curRubric,
          ci,ri,onNext:goPartB,onBack:goBack})),
      step==="partB" && curRubric && h(SL,null,
        h(PartBScreen,{key:"B-"+curRubric.id,caseData:curCase,rubric:curRubric,
          ci,ri,isLast:doneR+1>=totalR,onSubmit:submitRubric,partAData,onBack:()=>{setStep("partA");scrollTop();}})),
      step==="done" && h(DoneScreen,{responses,onBack:()=>{setStep("partB");scrollTop();}})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script></body></html>
