        d1:[
          {id:"1-1-1-1",pts:5,en:"Item 1. Introduction and Dyadic Rapport: Introduces self clearly to both parent and child. Establishes an age-appropriate connection with the 6-year-old (e.g., getting on eye level, using simple language) while maintaining professional engagement with the caregiver.",ko:"항목 1. 소개 및 양자 관계 형성: 부모와 아동 모두에게 명확히 자기소개. 6세 아동과 눈높이를 맞추고 쉬운 언어를 사용하여 나이에 적합한 소통 시도. 보호자와 전문적 관계 유지.",xEn:"In pediatrics, the history is obtained from two sources. Ignoring the child yields poor data regarding subjective pain, while ignoring the parent misses the timeline. 5 points are awarded for establishing the trust necessary to perform a physical exam later.",xKo:"소아과에서 병력은 두 가지 출처에서 얻습니다. 아동을 무시하면 주관적 통증에 대한 정보가 부정확해지고, 보호자를 무시하면 발병 경과를 놓칩니다. 5점은 후에 신체 검진을 수행하기 위한 신뢰 형성에 부여됩니다."},
          {id:"1-1-1-2",pts:10,en:"Item 2. Chronology and Symptom Characterization (HPI Structure): Elicits a clear timeline of illness onset (2 days ago), progression of fever, and the sequence of pain symptoms using a structured approach (e.g., OLDGAR or OPQRST). Clarifies the exact nature of the \"abdominal pain\" (suprapubic vs. generalized).",ko:"항목 2. 시간 경과 및 증상 특성화 (HPI 구조): 발병 시점(2일 전), 발열 진행 과정, 통증 증상의 순서를 구조화된 접근법(OLDGAR 또는 OPQRST)으로 명확히 파악. \"복통\"의 정확한 성격(치골상부 vs. 전반적)을 구분.",xEn:"A disorganized timeline makes it difficult to distinguish an acute infection from a chronic issue or to determine if the child is deteriorating. This carries 10 points as it forms the skeleton of the clinical narrative.",xKo:"비체계적인 시간 경과는 급성 감염과 만성 문제를 구별하거나 악화 여부를 판단하기 어렵게 만듭니다. 임상 서술의 핵심 골격을 형성하므로 10점이 부여됩니다."},
          {id:"1-1-1-3",pts:10,en:"Item 3. Past Medical, Surgical, and Medication History: Specifically asks about previous UTIs, hospitalizations, known renal anomalies (e.g., VUR), current medications, and allergies.",ko:"항목 3. 과거 병력, 수술력 및 복용 약물력: 이전 요로감염, 입원력, 알려진 신장 기형(예: 방광요관역류), 현재 복용 약물, 알레르기에 대해 구체적으로 문진.",xEn:"This is a critical safety check. Missing a history of Vesicoureteral Reflux (VUR) or prior recurrent UTIs drastically changes the management plan (need for renal ultrasound or admission).",xKo:"이것은 중요한 안전 확인 사항입니다. 방광요관역류(VUR) 병력이나 반복성 요로감염을 놓치면 치료 계획이 크게 달라집니다."},
          {id:"1-1-1-4",pts:5,en:"Item 4. Social and Environmental History: Inquires about the living situation, who the primary caregiver is, and school attendance.",ko:"항목 4. 사회력 및 환경력: 거주 환경, 주 보호자, 학교 출석 여부에 대해 문진.",xEn:"Understanding the home environment is necessary to determine if the family can manage a potentially complicated UTI (pyelonephritis) at home with oral antibiotics or if social admission is required.",xKo:"가정 환경을 파악하는 것은 가족이 복잡한 요로감염(신우신염)을 경구 항생제로 가정에서 관리할 수 있는지 또는 사회적 입원이 필요한지 판단하는 데 필수적입니다."},
          {id:"1-1-1-5",pts:10,en:"Item 5. Communication Technique and Synthesis: Uses open-ended questions initially, followed by closed questions for clarification. Avoids medical jargon. Summarizes findings back to the family to ensure accuracy (\"closed-loop communication\").",ko:"항목 5. 의사소통 기법 및 종합: 처음에 개방형 질문을 사용한 후 확인을 위해 폐쇄형 질문 사용. 의학 전문 용어 회피. 가족에게 소견을 요약하여 정확성 확인(\"폐쇄 루프 의사소통\").",xEn:"This ensures the clinician has correctly interpreted the family's concerns. High points are awarded here because misinterpretation of \"pain\" or \"fever\" frequency can lead to diagnostic errors.",xKo:"이는 임상의가 가족의 우려를 정확히 해석했음을 보장합니다. \"통증\"이나 \"발열\" 빈도의 오해는 진단 오류로 이어질 수 있어 높은 점수가 부여됩니다."},

        d2:[
          {id:"1-1-2-1",pts:20,en:"Item 6. Differentiation of Upper vs. Lower Tract Involvement (Pyelonephritis Screen): Specifically seeks signs of upper tract extension. Asks explicitly about flank/back pain, the height of the fever, rigor/shaking chills, and systemic malaise.",ko:"항목 6. 상부 vs. 하부 요로 침범 구별 (신우신염 선별): 상부 요로 확장 징후를 구체적으로 탐색. 예통/허리 통증, 발열 정도, 오한/전율, 전신 권태감에 대해 명시적으로 문진.",xEn:"This is the most critical part of this specific case. The vignette highlights a 6-year-old with high fever and new back pain. The clinician must recognize this as likely pyelonephritis, not simple cystitis. Failure to ask about back pain implies a failure to recognize the severity of the diagnosis.",xKo:"이것은 이 사례에서 가장 중요한 부분입니다. 임상의는 이를 단순 방광염이 아닌 신우신염 가능성으로 인식해야 합니다."},
          {id:"1-1-2-2",pts:10,en:"Item 7. Assessment of Hydration and Systemic Stability: Quantifies oral intake (liquids/solids) and output (wet diapers/voiding frequency despite dysuria). Asks about vomiting and activity level (lethargy).",ko:"항목 7. 수분 상태 및 전신 안정성 평가: 경구 섭취량(액체/고형물) 및 배출량(배뇨통에도 불구하고 젖은 기저귀/배뇨 빈도) 정량화. 구토 및 활동 수준(무기력증) 문진.",xEn:"Children with pyelonephritis are at risk for dehydration and sepsis. Even if the diagnosis is correct, if the clinician fails to identify that the child is vomiting and cannot tolerate oral antibiotics, the disposition plan will fail.",xKo:"신우신염 환아는 탈수와 패혈증 위험이 있습니다."},
          {id:"1-1-2-3",pts:15,en:"Item 8. Investigation of Predisposing Functional Factors: Detailed inquiry into voiding and bowel habits. Specifically asks about constipation (stool frequency/consistency), voiding postponement (holding urine at school), and wiping hygiene.",ko:"항목 8. 소인이 되는 기능적 요인 조사: 배뇨 및 배변 습관에 대한 상세한 문진. 변비(배변 빈도/성상), 배뇨 지연(학교에서 소변 참기), 닦기 위생에 대해 구체적으로 문진.",xEn:"In a 6-year-old female, \"functional constipation and voiding postponement\" are the leading causes of UTIs. Identifying this is essential for preventing recurrence. 15 points are awarded because this treats the cause, not just the symptom.",xKo:"6세 여아에서 \"기능성 변비와 배뇨 지연\"은 요로감염의 주요 원인입니다. 15점은 증상이 아닌 원인을 치료하기 때문에 부여됩니다."},
          {id:"1-1-2-4",pts:10,en:"Item 9. Pertinent Negatives and Broad Differential: Asks questions to rule out other causes of fever and abdominal pain. Specifically: respiratory symptoms (pneumonia), throat pain (strep), diarrhea (gastroenteritis), and vaginal discharge/irritation (vulvovaginitis/foreign body).",ko:"항목 9. 관련 음성 소견 및 광범위 감별진단: 발열과 복통의 다른 원인을 배제하기 위한 문진. 구체적으로: 호흡기 증상(폐렴), 인후통(연쇄구균), 설사(위장염), 질 분비물/자극(외음부질염/이물).",xEn:"\"Abdominal pain and fever\" is a broad presentation. The clinician must demonstrate they have considered lower lobe pneumonia or appendicitis to ensure they aren't anchoring on the UTI too early.",xKo:"\"복통과 발열\"은 광범위한 증상입니다. 다른 병리를 배제하지 않고 요로감염에 조기 고정하지 않도록 해야 합니다."},
          {id:"1-1-2-5",pts:5,en:"Item 10. Family History of Renal Disease: Inquiries about family history of vesicoureteral reflux, childhood UTIs in parents/siblings, or renal failure.",ko:"항목 10. 신장 질환 가족력: 방광요관역류, 부모/형제의 소아기 요로감염, 또는 신부전에 대한 가족력 문진.",xEn:"Genetic predisposition to VUR is significant. This history influences the decision to pursue imaging (Renal US/VCUG) after the acute infection resolves.",xKo:"VUR에 대한 유전적 소인은 중요합니다. 이 병력은 급성 감염 회복 후 영상검사 시행 여부 결정에 영향을 미칩니다."},
        ],

      {
        id:"1-2", label_en:"Rubric 2", label_ko:"기준표 2", d1pts:40, d2pts:60,

        d1desc_ko:"이 영역은 모든 소아 응급 상황에 적용 가능한 완전하고 구조화된 일반 임상 병력을 청취하는 능력을 평가합니다.",
        d2desc_en:"This domain evaluates the candidate's clinical reasoning, specifically their ability to identify upper urinary tract involvement, assess severity, and explore modifiable risk factors.",
        d2desc_ko:"이 영역은 응시자의 임상 추론 능력, 특히 상부 요로 침범 파악, 중증도 평가, 수정 가능한 위험 요인 탐색 능력을 평가합니다.",
        d1:[
          {id:"1-2-1-1",pts:8,en:"Item 1. Establishes Chief Concern and Symptom Chronology: Clearly elicits the main concerns (fever, abdominal pain, dysuria) and establishes precise onset, duration, progression, and sequence of symptoms.",ko:"항목 1. 주 호소 및 증상 경과 파악: 주요 증상(발열, 복통, 배뇨통)을 명확히 파악하고 정확한 발병 시점, 기간, 진행 과정, 증상 순서를 확인.",xEn:"A clear timeline is foundational to clinical reasoning in emergency care.",xKo:"명확한 시간 경과는 응급 치료의 임상 추론의 기초입니다."},
          {id:"1-2-1-2",pts:8,en:"Item 2. Characterizes Each Symptom Thoroughly (OPQRST framework where applicable): Explores quality, location, radiation, severity, timing, aggravating/relieving factors for pain; quantifies fever (max temperature, method of measurement, response to antipyretics); clarifies urinary symptoms.",ko:"항목 2. 각 증상을 철저히 특성화 (해당 시 OPQRST 프레임워크 적용): 통증의 성질, 위치, 방사, 중증도, 시점, 악화/완화 요인 탐색; 발열 정량화; 요로 증상 명확화.",xEn:"Detailed symptom analysis improves diagnostic accuracy and distinguishes lower vs upper UTI or alternative diagnoses.",xKo:"세부적인 증상 분석은 진단 정확도를 향상시킵니다."},
          {id:"1-2-1-3",pts:6,en:"Item 3. Assesses Associated and Red-Flag Symptoms: Screens for vomiting, poor oral intake, lethargy, altered mental status, decreased urine output, rash, respiratory symptoms, or signs of sepsis.",ko:"항목 3. 동반 증상 및 적신호 증상 평가: 구토, 경구 섭취 불량, 무기력, 의식 변화, 소변량 감소, 발진, 호흡기 증상, 또는 패혈증 징후 선별.",xEn:"Identifying red flags is critical in pediatric emergency settings to recognize severe infection or systemic involvement.",xKo:"적신호 증상 파악은 소아 응급 환경에서 중증 감염이나 전신 침범을 인식하는 데 중요합니다."},
          {id:"1-2-1-4",pts:4,en:"Item 4. Past Medical, Birth, and Developmental History: Reviews prior illnesses, hospitalizations, known anomalies, prior urinary issues, growth and developmental status.",ko:"항목 4. 과거 병력, 출생력 및 발달력: 과거 질환, 입원력, 알려진 기형, 과거 요로 문제, 성장 및 발달 상태 검토.",xEn:"Baseline health and prior conditions influence risk stratification and management decisions.",xKo:"기본적인 건강 상태와 과거 질환은 위험도 평가와 치료 결정에 영향을 미칩니다."},
          {id:"1-2-1-5",pts:4,en:"Item 5. Medication and Allergy History: Identifies current/recent medications (including antipyretics or antibiotics) and drug allergies.",ko:"항목 5. 복용 약물 및 알레르기력: 현재/최근 복용 약물(해열제 또는 항생제 포함) 및 약물 알레르기 확인.",xEn:"Essential for safe prescribing, particularly if parenteral antibiotics may be required.",xKo:"비경구 항생제가 필요할 수 있는 경우 안전한 처방을 위해 필수적입니다."},
          {id:"1-2-1-6",pts:2,en:"Item 6. Immunization Status: Confirms vaccination history.",ko:"항목 6. 예방접종력: 접종 이력 확인.",xEn:"While less central in this case, immunization status contributes to overall infection risk assessment.",xKo:"이 사례에서는 덜 중심적이지만, 예방접종력은 전반적인 감염 위험 평가에 기여합니다."},
          {id:"1-2-1-7",pts:4,en:"Item 7. Family and Social History: Assesses family history of renal/urologic disease and relevant social factors (toilet habits, school behaviors, hygiene, possible stressors).",ko:"항목 7. 가족력 및 사회력: 신장/비뇨기과 질환 가족력 및 관련 사회적 요인(배뇨 습관, 학교에서의 행동, 위생 상태, 가능한 스트레스 요인 등) 확인.",xEn:"Social and familial context may identify risk factors (voiding postponement, genetic predisposition).",xKo:"사회적 및 가족적 맥락은 위험 요인을 파악하는 데 도움이 됩니다."},
          {id:"1-2-1-8",pts:4,en:"Item 8. Structured Review of Systems: Performs a focused but systematic ROS to detect alternative sources of fever (respiratory, gastrointestinal, dermatologic, neurologic).",ko:"항목 8. 구조화된 계통별 문진: 집중적이면서도 체계적인 계통별 문진을 통해 다른 발열 원인(호흡기, 위장관, 피부, 신경계)을 탐색.",xEn:"Prevents premature closure and ensures competing diagnoses are considered.",xKo:"조기 결론을 방지하고 경쟁 진단을 고려할 수 있게 합니다."},
        ],
        d2:[
          {id:"1-2-2-1",pts:12,en:"Item 9. Differentiates Upper vs Lower Urinary Tract Infection: Specifically asks about flank pain, back pain, high-grade fever, chills/rigors, nausea/vomiting, and systemic symptoms.",ko:"항목 9. 상부 vs 하부 요로감염 구별: 옆구리 통증, 허리 통증, 고열, 오한/전율, 오심/구토, 전신 증상에 대해 구체적으로 문진.",xEn:"Distinguishing cystitis from pyelonephritis determines need for parenteral therapy, imaging, and potential admission.",xKo:"방광염과 신우신염을 구분하면 비경구 치료, 영상검사, 입원 필요성이 결정됩니다."},
          {id:"1-2-2-2",pts:8,en:"Item 10. Evaluates Hydration and Oral Intake: Assesses fluid intake, vomiting, urine output, ability to tolerate oral medications.",ko:"항목 10. 수분 상태 및 경구 섭취 평가: 수분 섭취량, 구토, 소변량, 경구 약물 복용 가능 여부 평가.",xEn:"Hydration status influences severity assessment and route of antibiotic administration.",xKo:"수분 상태는 중증도 평가와 항생제 투여 경로에 영향을 미칩니다."},
          {id:"1-2-2-3",pts:8,en:"Item 11. Assesses Severity and Sepsis Risk: Screens for lethargy, altered responsiveness, persistent tachycardia, hypotension symptoms, rigors, or decreased perfusion.",ko:"항목 11. 중증도 및 패혈증 위험 평가: 무기력, 반응 변화, 지속적 빈맥, 저혈압 증상, 오한, 또는 관류 감소 선별.",xEn:"Pyelonephritis can progress to urosepsis; early recognition of systemic compromise is critical in emergency care.",xKo:"신우신염은 요로패혈증으로 진행될 수 있습니다."},
          {id:"1-2-2-4",pts:8,en:"Item 12. Explores Urinary Pattern and Dysfunction: Clarifies frequency, urgency, incontinence, hesitancy, weak stream, constipation, stool withholding, and voiding postponement behaviors.",ko:"항목 12. 배뇨 양상 및 기능 이상 탐색: 빈뇨, 요절박, 요실금, 요주저, 약한 요류, 변비, 대변 참기, 배뇨 지연 행동 명확화.",xEn:"Voiding dysfunction and constipation are key pediatric risk factors for UTI and recurrence.",xKo:"배뇨 기능 이상과 변비는 소아 요로감염 및 재발의 주요 위험 요인입니다."},
          {id:"1-2-2-5",pts:6,en:"Item 13. Prior UTI History and Prior Antibiotic Exposure: Asks about previous urinary infections, prior urine cultures, imaging studies, or recent antibiotic use.",ko:"항목 13. 이전 요로감염력 및 항생제 노출력: 이전 요로감염, 소변 배양 검사, 영상검사, 또는 최근 항생제 사용 여부 문진.",xEn:"Prior history influences likelihood of structural abnormalities and antibiotic resistance patterns.",xKo:"이전 병력은 구조적 이상 가능성과 항생제 내성 패턴에 영향을 미칩니다."},
          {id:"1-2-2-6",pts:6,en:"Item 14. Assesses for Underlying Urinary Tract Abnormalities: Screens for known reflux, prenatal hydronephrosis, abnormal urinary stream, recurrent unexplained fevers.",ko:"항목 14. 기저 요로 기형 평가: 알려진 역류, 출생 전 수신증, 비정상적 요류, 반복적 원인 불명의 발열 선별.",xEn:"Structural anomalies significantly affect management and need for follow-up imaging.",xKo:"구조적 이상은 치료 방침과 추적 영상 검사의 필요성에 중요한 영향을 미칩니다."},
          {id:"1-2-2-7",pts:6,en:"Item 15. Screens for Alternative Diagnoses: Evaluates for appendicitis (migration of pain, anorexia), gastroenteritis, vulvovaginitis, trauma, or pelvic pathology.",ko:"항목 15. 감별 진단 선별: 충수염(통증 이동, 식욕 부진), 위장염, 외음부질염, 외상, 또는 골반 병리 평가.",xEn:"Abdominal pain with fever requires exclusion of surgical and gynecologic mimics.",xKo:"발열을 동반한 복통은 외과적 및 부인과적 유사 질환을 배제해야 합니다."},
          {id:"1-2-2-8",pts:4,en:"Item 16. Hygiene and Perineal Factors: Asks about wiping technique, bubble baths, tight clothing, recent irritation, or possible foreign body.",ko:"항목 16. 위생 및 회음부 요인: 닦기 방법, 거품 목욕, 꽉 끼는 의복, 최근 자극, 또는 이물 가능성 문진.",xEn:"Perineal hygiene practices are common modifiable contributors to UTI risk in young girls.",xKo:"회음부 위생 습관은 어린 여아의 요로감염 위험에 흔히 수정 가능한 기여 요인입니다."},
          {id:"1-2-2-9",pts:2,en:"Item 17. Recent Illnesses or Hematogenous Sources: Asks about recent skin infections, bacteremia risk, or systemic infections.",ko:"항목 17. 최근 질환 또는 혈행성 원인: 최근 피부 감염, 균혈증 위험, 또는 전신 감염 문진.",xEn:"Though less common, hematogenous spread can cause renal infection; lower weight but demonstrates comprehensive reasoning.",xKo:"덜 흔하지만 혈행성 전파는 신장 감염을 유발할 수 있습니다."},
        ],
      },
      {
        id:"1-3", label_en:"Rubric 3", label_ko:"기준표 3", d1pts:40, d2pts:60,
        d1desc_en:"This domain evaluates the candidate's ability to conduct a comprehensive general clinical history, demonstrating organized and patient-centered communication skills.",
        d1desc_ko:"이 영역은 체계적이고 환자 중심적인 의사소통 기술을 발휘하여 포괄적인 일반 임상 병력을 청취하는 응시자의 능력을 평가합니다.",
        d2desc_en:"This domain evaluates case-specific diagnostic reasoning for pediatric febrile UTI/pyelonephritis, with emphasis on distinguishing upper from lower tract disease and identifying modifiable risk factors.",
        d2desc_ko:"이 영역은 소아 발열성 요로감염/신우신염에 대한 사례 특이적 진단 추론을 평가하며, 상부 대 하부 요로 질환 구별 및 수정 가능한 위험 요인 파악에 중점을 둡니다.",
        d1:[
          {id:"1-3-1-1",pts:8,en:"Item 1. Presenting Complaint Characterization: Systematic exploration of each presenting symptom (fever, abdominal pain, dysuria) including onset, duration, severity, progression, and aggravating/relieving factors.",ko:"항목 1. 호소 증상 특성화: 각 호소 증상(발열, 복통, 배뇨통)의 발병 시점, 기간, 중증도, 진행 과정, 악화/완화 요인을 체계적으로 탐색.",xEn:"Thorough characterization of the chief complaint is foundational to all clinical reasoning. This receives high weighting as it anchors the entire history.",xKo:"주 호소 증상의 철저한 특성화는 모든 임상 추론의 기초입니다."},
          {id:"1-3-1-2",pts:5,en:"Item 2. Past Medical History: Inquiry into prior illnesses, hospitalizations, surgeries, chronic conditions, and prior similar episodes.",ko:"항목 2. 과거 병력: 과거 질환, 입원, 수술, 만성 질환, 이전 유사 에피소드 문진.",xEn:"Pre-existing conditions (e.g., known vesicoureteral reflux, prior renal anomalies, recurrent infections) fundamentally alter the risk profile and management approach.",xKo:"기존 질환은 위험 프로파일과 치료 접근 방식을 근본적으로 변경합니다."},
          {id:"1-3-1-3",pts:5,en:"Item 3. Medication and Allergy History: Current medications, recent antibiotic use, and documented drug allergies including reaction type.",ko:"항목 3. 복용 약물 및 알레르기력: 현재 복용 약물, 최근 항생제 사용, 반응 유형을 포함한 약물 알레르기 기록.",xEn:"Recent antibiotic exposure influences empiric treatment choices and resistance patterns.",xKo:"최근 항생제 노출은 경험적 치료 선택과 내성 패턴에 영향을 미칩니다."},
          {id:"1-3-1-4",pts:2,en:"Item 4. Immunization Status: Confirmation of vaccination history.",ko:"항목 4. 예방접종력: 접종 이력 확인.",xEn:"While less directly relevant to UTI management, immunization status is a standard pediatric history element.",xKo:"요로감염 관리와 직접적인 관련은 적지만, 예방접종력은 표준 소아 병력 항목입니다."},
          {id:"1-3-1-5",pts:4,en:"Item 5. Birth and Developmental History: Inquiry into perinatal history (including antenatal scans), developmental milestones, and continence milestones.",ko:"항목 5. 출생력 및 발달력: 산전 병력(태아 초음파 포함), 발달 이정표, 배변 훈련 이정표 문진.",xEn:"Antenatal ultrasound findings (e.g., hydronephrosis) may indicate underlying urological anomalies predisposing to UTI.",xKo:"태아 초음파 소견(예: 수신증)은 요로감염 소인이 되는 비뇨기 기형을 시사할 수 있습니다."},
          {id:"1-3-1-6",pts:4,en:"Item 6. Social and Family History: Household composition, school attendance, family history of relevant conditions, and any safeguarding considerations.",ko:"항목 6. 사회력 및 가족력: 가구 구성, 학교 출석, 관련 질환 가족력, 및 아동 보호 고려사항.",xEn:"Family history of renal disease or vesicoureteral reflux has direct diagnostic implications.",xKo:"신장 질환 또는 방광요관역류의 가족력은 직접적인 진단적 함의가 있습니다."},
          {id:"1-3-1-7",pts:5,en:"Item 7. Review of Systems: Structured screening of systems not already covered by the presenting complaint to identify missed pathology or red flags.",ko:"항목 7. 계통별 문진: 누락된 병리나 적신호를 식별하기 위해 호소 증상에서 아직 다루지 않은 계통의 구조화된 선별.",xEn:"A targeted review of systems ensures the clinician has not anchored prematurely.",xKo:"계통별 문진은 임상의가 조기에 고착되지 않도록 보장합니다."},
          {id:"1-3-1-8",pts:4,en:"Item 8. Fluid Intake and Hydration Assessment: Inquiry into oral fluid intake, urine output, and signs of dehydration (tears, wet nappies/voiding frequency, activity level).",ko:"항목 8. 수분 섭취 및 수분 상태 평가: 경구 수분 섭취, 소변량, 탈수 징후(눈물, 젖은 기저귀/배뇨 빈도, 활동 수준) 문진.",xEn:"Hydration status directly informs the decision between oral and intravenous management in the emergency department.",xKo:"수분 상태는 응급실에서 경구 또는 정맥 내 치료 결정에 직접적인 영향을 미칩니다."},
          {id:"1-3-1-9",pts:3,en:"Item 9. Structured and Organized Approach: History is obtained in a logical sequence, is comprehensive without being disorganized, and demonstrates clear clinical reasoning.",ko:"항목 9. 구조화되고 체계적인 접근: 논리적 순서로 병력을 청취하고, 혼란 없이 포괄적이며 명확한 임상 추론을 보임.",xEn:"The quality of history taking is not only about content but process.",xKo:"병력 청취의 질은 내용뿐만 아니라 과정에 관한 것입니다."},
        ],
        d2:[
          {id:"1-3-2-1",pts:12,en:"Item 10. Urinary Symptom Characterization: Detailed inquiry into dysuria (onset, severity), frequency, urgency, incontinence (new-onset), hematuria, urine color/odor changes, and straining.",ko:"항목 10. 요로 증상 특성화: 배뇨통(발병 시점, 중증도), 빈뇨, 요절박, 요실금(신규 발생), 혈뇨, 소변 색/냄새 변화, 배뇨 시 힘주기에 대한 상세한 문진.",xEn:"This is the single most important diagnostic line of questioning for this presentation. This receives the highest individual weighting in the rubric.",xKo:"이것은 이 증상에 대한 가장 중요한 진단 문진입니다."},
          {id:"1-3-2-2",pts:10,en:"Item 11. Features Distinguishing Upper from Lower UTI: Specific inquiry into flank/back pain, rigors, high-grade or persistent fever, malaise, vomiting, and poor oral intake.",ko:"항목 11. 상부 vs 하부 요로감염 구별 특징: 옆구리/허리 통증, 전율, 고열 또는 지속적 발열, 권태감, 구토, 경구 섭취 불량에 대한 구체적 문진.",xEn:"The critical clinical decision in this case is whether the presentation suggests pyelonephritis versus simple cystitis.",xKo:"이 사례의 핵심 임상 결정은 신우신염인지 단순 방광염인지 여부입니다."},
          {id:"1-3-2-3",pts:8,en:"Item 12. Prior UTI and Urological History: History of previous UTIs (number, frequency, culture results), prior renal imaging, known vesicoureteral reflux, renal anomalies, or urological interventions.",ko:"항목 12. 이전 요로감염 및 비뇨기과력: 이전 요로감염(횟수, 빈도, 배양 결과), 이전 신장 영상검사, 알려진 방광요관역류, 신장 기형, 또는 비뇨기과 시술 병력.",xEn:"Recurrent UTI in a young child raises suspicion for underlying structural or functional abnormality.",xKo:"어린 아이의 재발성 요로감염은 기저 구조적 또는 기능적 이상을 의심하게 합니다."},
          {id:"1-3-2-4",pts:8,en:"Item 13. Voiding Habits and Bowel Function: Inquiry into voiding frequency, postponement behaviors, incomplete emptying, fluid intake habits, constipation, and encopresis.",ko:"항목 13. 배뇨 습관 및 배변 기능: 배뇨 빈도, 지연 행동, 불완전 배뇨, 수분 섭취 습관, 변비, 유분증 문진.",xEn:"Dysfunctional voiding and constipation are among the most common modifiable risk factors for pediatric UTI.",xKo:"기능성 배뇨 장애와 변비는 소아 요로감염에서 가장 흔한 수정 가능한 위험 요인입니다."},
          {id:"1-3-2-5",pts:7,en:"Item 14. Fever Pattern and Systemic Illness Assessment: Duration, peak temperature, response to antipyretics, associated rigors, lethargy, irritability, appetite changes, and overall activity level.",ko:"항목 14. 발열 패턴 및 전신 질환 평가: 기간, 최고 체온, 해열제 반응, 동반 전율, 무기력, 과민성, 식욕 변화, 전반적 활동 수준.",xEn:"The fever pattern helps gauge severity and risk of bacteremia or sepsis.",xKo:"발열 패턴은 중증도와 균혈증 또는 패혈증 위험을 평가하는 데 도움이 됩니다."},
          {id:"1-3-2-6",pts:7,en:"Item 15. Differential Diagnosis–Oriented Questioning: Targeted questions to exclude appendicitis (migration of pain, vomiting, anorexia), gynecological causes (vaginal discharge, irritation), nephrolithiasis (colicky pain, hematuria), and other causes of acute abdomen.",ko:"항목 15. 감별 진단 지향적 문진: 충수염(통증 이동, 구토, 식욕 부진), 부인과적 원인(질 분비물, 자극), 신장 결석(산통성 통증, 혈뇨), 기타 급성 복부 원인을 배제하기 위한 목표 질문.",xEn:"A 6-year-old girl with fever, abdominal pain, and back pain has a differential that extends beyond UTI.",xKo:"발열, 복통, 허리 통증이 있는 6세 여아의 감별 진단은 요로감염을 넘어섭니다."},
          {id:"1-3-2-7",pts:5,en:"Item 16. Genital Hygiene and Exposure History: Inquiry into bathing practices, use of irritants (bubble baths, soaps), wiping technique, underwear type, and — with appropriate sensitivity — any concerns for abuse or inappropriate contact.",ko:"항목 16. 생식기 위생 및 노출력: 목욕 습관, 자극 물질(거품 목욕, 비누) 사용, 닦기 방법, 속옷 종류, 그리고 적절한 감수성을 갖고 학대나 부적절한 접촉에 대한 우려 문진.",xEn:"Local irritation can cause dysuria without infection, and hygiene factors contribute to recurrent UTI risk.",xKo:"국소 자극은 감염 없이 배뇨통을 유발할 수 있으며, 위생 요인은 재발성 요로감염 위험에 기여합니다."},
          {id:"1-3-2-8",pts:3,en:"Item 17. Red Flags for Sepsis and Serious Illness: Specific inquiry into altered consciousness, mottled skin, reduced urine output, inconsolability, poor feeding, and rapid clinical deterioration.",ko:"항목 17. 패혈증 및 중증 질환 적신호: 의식 변화, 얼룩덜룩한 피부, 소변량 감소, 달래기 불가, 수유 불량, 급격한 임상 악화에 대한 구체적 문진.",xEn:"While this child appears relatively well, any febrile child in the emergency department warrants screening for sepsis red flags.",xKo:"이 아이는 비교적 양호해 보이지만, 응급실의 모든 발열 아이는 패혈증 적신호 선별이 필요합니다."},

        id:"1-4", label_en:"Rubric 4", label_ko:"기준표 4", d1pts:50, d2pts:50,
        d1desc_en:"This domain evaluates core history-taking skills applicable across all pediatric emergency presentations.",
        d1desc_ko:"이 영역은 모든 소아 응급 상황에 적용 가능한 핵심 병력 청취 기술을 평가합니다.",
        d2desc_en:"This domain evaluates case-specific diagnostic history for pediatric UTI/pyelonephritis.",
        d2desc_ko:"이 영역은 소아 요로감염/신우신염에 대한 사례 특이적 진단 병력을 평가합니다.",
        d1:[
          {id:"1-4-1-1",pts:5,en:"Item 1. Chief Complaint: Clearly elicits and articulates the primary presenting problem(s) in patient's/family's own words.",ko:"항목 1. 주호소(Chief Complaint): 환자 또는 보호자의 표현을 그대로 반영하여 주요 호소 증상을 명확히 확인하고 정리한다.",xEn:"Establishes focus of encounter; foundational for all histories, weighted modestly as routinely expected.",xKo:"진료의 초점을 설정하는 단계로 모든 병력 청취의 기초가 된다."},
          {id:"1-4-1-2",pts:12,en:"Item 2. History of Presenting Illness: Systematically explores onset, timing, duration, severity, progression, aggravating/alleviating factors, and associated symptoms using a structured approach (e.g., OPQRST).",ko:"항목 2. 현병력(History of Presenting Illness): OPQRST와 같은 구조화된 접근을 사용하여 발병 시점, 발생 시기, 지속 기간, 중증도, 진행 양상, 악화/완화 요인, 동반 증상을 체계적으로 탐색한다.",xEn:"Captures dynamic illness trajectory critical for urgency assessment in EM; highest weight due to centrality in pediatric differentials.",xKo:"질환의 시간적 경과와 변화를 파악하는 것은 응급의학에서 긴급도를 판단하는 데 핵심적이다."},
          {id:"1-4-1-3",pts:7,en:"Item 3. Past Medical History: Inquires about chronic illnesses, prior hospitalizations, surgeries, developmental milestones, and previous similar episodes.",ko:"항목 3. 과거 병력: 만성 질환, 이전 입원 이력, 수술 이력, 발달 이정표, 과거 유사 증상 발생 여부를 확인한다.",xEn:"Identifies comorbidities or recurrent patterns affecting management; moderate weight as baseline risk stratification.",xKo:"동반 질환이나 반복되는 질환 양상을 파악하여 치료 계획에 영향을 미칠 수 있다."},
          {id:"1-4-1-4",pts:4,en:"Item 4. Medications: Documents current prescriptions, over-the-counter drugs, recent antibiotics, and adherence.",ko:"항목 4. 약물 복용력: 현재 처방약, 일반의약품, 최근 항생제 사용, 약물 복용 순응도를 확인한다.",xEn:"Prevents interactions and guides therapy; lower weight as typically straightforward.",xKo:"약물 상호작용을 예방하고 치료 계획을 결정하는 데 도움이 된다."},
          {id:"1-4-1-5",pts:4,en:"Item 5. Allergies: Asks about drug/food allergies, adverse reactions, and anaphylaxis history.",ko:"항목 5. 알레르기 병력: 약물 및 음식 알레르기, 이상 반응, 아나필락시스 병력을 확인한다.",xEn:"Ensures safe prescribing; paired low weight with medications for safety screening.",xKo:"안전한 처방을 위해 필수적인 확인 단계이다."},
          {id:"1-4-1-6",pts:4,en:"Item 6. Immunizations: Confirms status, recent vaccines, and any gaps relevant to infectious risks.",ko:"항목 6. 예방접종: 예방접종 상태, 최근 접종 여부, 감염 위험과 관련된 접종 공백 여부를 확인한다.",xEn:"Essential in pediatrics for outbreak context; low weight as often documented.",xKo:"소아 진료에서 감염병 유행 상황을 고려할 때 중요하다."},
          {id:"1-4-1-7",pts:5,en:"Item 7. Family History: Explores hereditary conditions, consanguinity, and relevant familial illnesses.",ko:"항목 7. 가족력: 유전 질환, 근친혼 여부, 관련 가족 질환에 대해 확인한다.",xEn:"Uncovers genetic risks (e.g., renal disorders); slightly higher for pediatric relevance.",xKo:"신장 질환과 같은 유전적 위험 요인을 확인할 수 있다."},
          {id:"1-4-1-8",pts:4,en:"Item 8. Social History: Assesses home environment, caregivers, school exposure, and basic habits.",ko:"항목 8. 사회력: 가정 환경, 보호자, 학교에서의 노출, 기본적인 생활 습관을 평가한다.",xEn:"Contextualizes adherence and exposures; low weight as supportive.",xKo:"치료 순응도와 환경적 노출을 이해하는 데 도움이 되는 맥락 정보를 제공한다."},
          {id:"1-4-1-9",pts:5,en:"Item 9. Review of Systems: Performs age-appropriate screening for unrelated symptoms to avoid missing comorbidities.",ko:"항목 9. 전신 증상 검토(Review of Systems): 관련되지 않은 증상을 놓치지 않도록 연령에 적절한 체계적 선별을 시행한다.",xEn:"Broadens differential; moderate weight for comprehensive safety net.",xKo:"감별 진단의 범위를 넓히는 데 도움이 된다."},
        ],
        d2:[
          {id:"1-4-2-1",pts:12,en:"Item 10. Urinary Symptoms: Probes dysuria, frequency, urgency, hematuria, odor, or enuresis in detail.",ko:"항목 10. 배뇨 증상: 배뇨 시 통증, 빈뇨, 절박뇨, 혈뇨, 소변 냄새 변화, 야뇨증 여부 등을 자세히 확인한다.",xEn:"Hallmark of UTI; highest weight as directly confirms diagnosis and differentiates cystitis vs. pyelonephritis.",xKo:"요로감염의 핵심적인 증상이다. 진단을 직접적으로 확인하고 방광염과 신우신염을 구분하는 데 도움이 된다."},
          {id:"1-4-2-2",pts:10,en:"Item 11. Pain Characterization: Localizes abdominal/suprapubic or flank pain, assesses radiation, quality, severity, and timing.",ko:"항목 11. 통증 특성 평가: 복부/치골상부 또는 옆구리 통증의 위치를 확인하고, 방사 여부, 통증의 성질, 중증도, 발생 시점을 평가한다.",xEn:"Pinpoints pyelonephritis (e.g., CVA tenderness correlate); high weight for localizing infection site.",xKo:"감염의 위치를 파악하는 데 도움이 된다."},
          {id:"1-4-2-3",pts:8,en:"Item 12. Voiding and Bowel Habits: Inquires about toilet training, postponing urination, constipation, or hygiene practices.",ko:"항목 12. 배뇨 및 배변 습관: 배변 훈련 여부, 배뇨를 미루는 습관, 변비, 위생 습관 등에 대해 확인한다.",xEn:"Identifies modifiable risk factors for pediatric UTI; substantial weight for prevention and management insights.",xKo:"소아 요로감염의 수정 가능한 위험 요인을 파악하는 데 도움이 된다."},
          {id:"1-4-2-4",pts:7,en:"Item 13. Prior UTIs or Anomalies: Asks about recurrent infections, vesicoureteral reflux, or structural issues.",ko:"항목 13. 이전 요로감염 또는 구조적 이상: 반복적인 요로감염, 방광요관역류, 또는 구조적 이상 여부를 확인한다.",xEn:"Guides imaging/threshold for admission; moderate-high weight for recurrence risk.",xKo:"영상 검사 필요성이나 입원 기준 판단에 도움을 준다."},
          {id:"1-4-2-5",pts:7,en:"Item 14. Fever Details: Documents pattern, peak temperature, chills, response to antipyretics, and night sweats.",ko:"항목 14. 발열 세부 사항: 발열 양상, 최고 체온, 오한, 해열제에 대한 반응, 야간 발한 여부를 확인한다.",xEn:"Gauges systemic involvement in pyelonephritis; weighted for sepsis risk stratification.",xKo:"신우신염에서 전신 침범 여부를 평가하는 데 도움이 된다."},
          {id:"1-4-2-6",pts:6,en:"Item 15. Differentiating Symptoms: Screens for vomiting, diarrhea, joint pains, or rash to exclude appendicitis, gastroenteritis, or other mimics.",ko:"항목 15. 감별 진단을 위한 증상 확인: 충수염, 위장염 또는 기타 유사 질환을 배제하기 위해 구토, 설사, 관절통, 발진 등의 증상을 확인한다.",xEn:"Refines differential in febrile abdominal pain; lower weight as confirmatory rather than primary.",xKo:"발열과 복통이 있는 경우 감별 진단을 정교하게 하는 데 도움이 된다."},

        d1desc_en:"총점: 100점 (영역 1: 38점 | 영역 2: 62점) Design Rationale for Domain Weighting: Domain 2 receives a heavier weighting (62/38) because in pediatric gastroenteritis, the quality of the clinical encounter depends overwhelmingly on the accuracy of dehydration assessment and the ability to exclude surgical mimics — both of which are history-driven skills. The general history elements in Domain 1 provide essential context and safety checks but are less discriminating of clinical competence for this specific presentation. The rubric intentionally emphasizes that the most impactful questions in this case are quantitative (how much in, how much out, how long since last void) rather than purely qualitative, reﬂecting the ﬂuid-balance–centered reasoning that defines excellent management of this common pediatric emergency. 영역 가중치 설계 근거: 소아 위장관염에서는 탈수 평가의 정확성과 외과적 질환 가능성을 배제하는 능력이 임상 평가의 핵심이 므로 영역 2에 더 높은 가중치(62/38)를 부여하였다. 이 두 가지는 모두 병력 청취에 크게 의존하는 기술이다. 영역 1의 일반 병 력 요소들은 중요한 배경 정보와 안전 확인 역할을 하지만, 이 증례에서 임상 역량을 구별하는 요소로서는 상대적으로 영향이 적 다. 따라서 이 기준표는 이 사례에서 가장 중요한 질문이 질적 질문이 아니라 정량적 질문(얼마나 섭취했는지, 얼마나 배출했는 지, 마지막 배뇨가 언제였는지 등)이라는 점을 강조하도록 설계되었다. 이는 소아에서 흔한 응급 상황인 위장관염 관리에서 핵심 이 되는 체액 균형 중심의 임상 추론을 반영한다. * A. Evaluation of Item Inclusion For each item below, please select “Agree” if you believe it should be included, or “Disagree” if not. A. 항목 포함 여부 평가 아래 각 항목에 대해 포함되어야 한다고 생각하시면 \"동의\", 그렇지 않으면 \"비동의\"를 선택해 주세요. Agree Disagree 동의 비동의 Domain 1: General Clinical History-Taking (38 points) 영역 1: 일반 임상 병력 청취 (38점)",

        d2desc_en:"항목 10. 병력 기반 탈수 평가: 소변량(마지막 젖은 기저귀/배뇨 시점, 배뇨 빈도, 소변 색), 울 때 눈물 여부, 지난 24시간 동안의 경구 섭취량, 활동/에너지 수준, 그리고 아이 의 상태 변화에 대한 보호자의 인식을 체계적으로 확인한다. — 14점 Explanation: This is the single most important line of questioning for this case. The clinical decision — oral rehydration versus IV ﬂuids, observation versus admission — hinges almost entirely on the assessed degree of dehydration. Urine output (no void in ~10 hours in this case) is the most reliable caregiver-reported proxy for hydration status. This receives the highest individual weighting because it directly and immediately determines management. 설명: 이 사례에서 가장 중요한 질문 영역이다. 경구 수분 보충인지 정맥 수액 치료인지, 관찰 후 귀가인지 입원이 필요한지에 대한 임상 결정은 거의 전적으로 탈수 정도 평가에 달려 있다. 특히 소변량(이 사례에서는 약 10시간 동안 배뇨 없음)은 보호자가 보고할 수 있는 수분 상태의 가장 신뢰할 수 있는 지표이다. 따라서 치료 결정에 직접적이고 즉 각적인 영향을 미친다는 점에서 가장 높은 개별 가중치를 부여하였다.",

        { en:"History of Presenting Illness", ko:"현병력", val_en:"8-month-old boy with 2 days of rhinorrhea and cough, now with tachypnea, retractions, and decreased oral intake over the last 12 hours. No prior wheeze history. One wet diaper since morning. No vomiting or diarrhea. No known aspiration events.", val_ko:"8개월 남아로 2일 전부터 콧물과 기침이 있었으며, 지난 12시간 동안 빈호흡, 흉부 함몰, 경구 섭취 감소가 나타남. 이전에 천명 병력 없음. 오늘 아침 이후 젖은 기저귀 1회. 구토나 설사 없음. 알려진 흡인 사건 없음." },
        { en:"Past Medical History", ko:"과거 병력", val_en:"Unremarkable; full-term; no cardiac history.", val_ko:"특이사항 없음; 만삭 출생; 심장 질환 병력 없음." },

    rubrics: [
      {
        id:"3-1", label_en:"Rubric 1", label_ko:"기준표 1", d1pts:36, d2pts:64,
        rationale_en:"Design Rationale for Domain Weighting: Domain 2 is weighted heavily (64/36) because bronchiolitis management in infants is overwhelmingly determined by case-specific factors elicited through history: respiratory trajectory, feeding capacity, hydration status, apnea risk, and the presence of established high-risk features. Domain 1 retains meaningful weight because birth history and prematurity screening carry unusually high case-specific significance in infant respiratory illness.",
        rationale_ko:"영역 가중치 설계 근거: 영아의 세기관지염 관리에서는 병력 청취를 통해 확인되는 사례 특이 요소—호흡 증상의 진행 양상, 수유 가능 여부, 수분 상태, 무호흡 위험, 그리고 고위험 인자의 존재—가 치료 결정에 큰 영향을 미치므로 영역 2에 더 높은 가중치(64/36)를 부여하였다.",
        d1desc_en:"This domain evaluates the candidate's ability to conduct a comprehensive general clinical history in the context of an infant with respiratory distress. Birth history and prematurity screening carry unusually high case-specific significance in infant respiratory illness.",
        d1desc_ko:"이 영역은 호흡곤란이 있는 영아의 맥락에서 포괄적인 일반 임상 병력을 청취하는 능력을 평가합니다. 출생력과 미숙아 여부 확인은 영아 호흡기 질환에서 매우 중요한 사례 특이적 의미를 가집니다.",
        d2desc_en:"This domain evaluates case-specific diagnostic history for infant bronchiolitis and respiratory distress (64 points).",
        d2desc_ko:"이 영역은 영아 세기관지염 및 호흡곤란에 대한 사례 특이적 진단 병력을 평가합니다 (64점).",
        d1:[
          {id:"3-1-1-1",pts:8,en:"Item 1. Presenting Complaint Characterization: Systematic exploration of cough (onset, character, progression, triggers), breathing difficulty (onset, trajectory, positional variation), and feeding difficulty (onset, degree of decline), including temporal relationships between symptoms.",ko:"항목 1. 주증상 특성 파악: 기침(발생 시점, 성상, 진행 양상, 유발 요인), 호흡곤란(발생 시점, 진행 경과, 자세에 따른 변화), 수유 곤란(발생 시점, 감소 정도)을 체계적으로 탐 색하고, 각 증상 간의 시간적 관계를 확인한다.",xEn:"In an infant who cannot verbalize, the caregiver's description of symptom onset, sequence, and trajectory is the primary diagnostic data source. Understanding that rhinorrhea preceded respiratory distress by 48 hours supports a typical bronchiolitis prodrome, while an abrupt onset would raise concern for foreign body or cardiac pathology. High weighting reflects foundational importance.",xKo:"자신의 증상을 표현할 수 없는 영아에서는 보호자가 설명하는 증상 발생 시점, 순 서, 진행 양상이 가장 중요한 진단 정보가 된다. 예를 들어 콧물이 48시간 먼저 나타난 후 호흡곤란이 발생했다면 전형적인 세기관지염의 전구 증상을 시사하지만, 증상이 갑 자기 시작되었다면 이물 흡인이나 심장 질환을 의심해야 한다. 이러한 기초 정보의 중요 성을 반영하여 높은 가중치를 부여하였다."},
          {id:"3-1-1-2",pts:7,en:"Item 2. Past Medical History: Inquiry into prematurity and gestational age, neonatal ICU admission, chronic lung disease (BPD), congenital heart disease, prior wheezing episodes, prior hospitalizations, and any history of airway anomalies.",ko:"항목 2. 과거 병력: 미숙아 여부 및 재태 연령, 신생아 중환자실 입원 병력, 만성 폐질환 (BPD), 선천성 심장 질환, 이전 천명 병력, 이전 입원 병력, 기도 기형 병력 여부를 확인 한다.",xEn:"This item receives elevated weighting because in bronchiolitis, the past medical history is a primary determinant of risk stratification. Prematurity (<37 weeks, especially <32 weeks), BPD, Disagree 비동의 hemodynamically significant congenital heart disease, and immunodeficiency are established high-risk features that directly influence disposition, monitoring intensity, and threshold for escalation. Failure to ask these questions represents a significant safety gap.",xKo:"세기관지염에서는 과거 병력이 위험도 평가의 핵심 요소이기 때문에 이 항목에 비 교적 높은 가중치를 부여하였다. 미숙아 출생(<37주, 특히 <32주), 기관지폐이형성증 (BPD), 혈역학적으로 의미 있는 선천성 심장 질환, 면역결핍 등은 잘 알려진 고위험 인 자이며, 이는 처치 결정, 모니터링 강도, 치료 단계 상승의 기준에 직접적인 영향을 미친 다. 이러한 질문을 하지 않는 것은 환자 안전 측면에서 중요한 공백이 된다."},
          {id:"3-1-1-3",pts:5,en:"Item 3. Birth and Neonatal History: Gestational age, birth weight, mode of delivery, NICU stay, need for respiratory support at birth, and any neonatal respiratory complications.",ko:"항목 3. 출생 및 신생아 병력: 재태 연령, 출생 체중, 분만 방식, NICU 입원 여부, 출생 시 호흡 보조 필요 여부, 신생아기 호흡기 합병증 여부를 확인한다.",xEn:"This is separated from general PMH because of its outsized importance in infant respiratory illness. An infant born at 34 weeks with transient tachypnea may have subtly reduced respiratory reserve not captured by \"unremarkable PMH.\" The specific details of neonatal respiratory course inform baseline vulnerability to bronchiolitis.",xKo:"이 항목은 영아 호흡기 질환에서 매우 중요한 의미를 가지기 때문에 일반 과거 병 력과 구분하여 평가한다. 예를 들어 34주에 태어나 일과성 빈호흡을 겪었던 영아는 “특 이사항 없는 과거 병력”으로 분류될 수 있지만 실제로는 호흡 예비력이 감소되어 있을 수 있다. 신생아기 호흡기 경과의 세부 정보는 세기관지염에 대한 기저 취약성을 판단하 는 데 도움이 된다."},
          {id:"3-1-1-4",pts:4,en:"Item 4. Medication and Allergy History: Current medications, any prior use of bronchodilators or inhaled therapies, palivizumab (Synagis) prophylaxis status, and drug allergies.",ko:"항목 4. 약물 및 알레르기 병력: 현재 복용 중인 약물, 이전 기관지확장제 또는 흡입 치 료 사용 여부, 팔리비주맙(Synagis) 예방 투여 여부, 약물 알레르기를 확인한다.",xEn:"Palivizumab eligibility and receipt is directly relevant to RSV disease in high-risk infants. Prior bronchodilator use suggests previous wheezing episodes, which may shift the diagnosis toward reactive airway disease with a viral trigger rather than first-episode bronchiolitis, altering management. Allergy documentation is standard safety practice.",xKo:"팔리비주맙 예방 투여 여부는 고위험 영아에서 RSV 질환 위험과 직접적으로 관련 된다. 또한 이전 기관지확장제 사용 병력이 있다면 첫 번째 세기관지염이 아니라 바이러 스 유발 반응성 기도 질환일 가능성을 시사할 수 있어 치료 접근이 달라질 수 있다. 알레 르기 확인은 표준적인 환자 안전 절차이다."},
          {id:"3-1-1-5",pts:3,en:"Item 5. Immunization History: Confirmation of up-to-date vaccinations for age, with attention to pertussis (DTaP) vaccination and any RSV maternal or infant immunization if available.",ko:"항목 5. 예방접종 병력: 연령에 맞는 예방접종이 완료되었는지 확인하고, 특히 백일해 (DTaP) 예방접종 여부와 가능하다면 RSV 관련 예방접종(니르세비맙, 산모 RSV 백신 등)을 확인한다.",xEn:"Pertussis can mimic bronchiolitis in infants and should be considered if immunizations are incomplete. Newer RSV immunization products (nirsevimab, maternal RSV vaccine) are increasingly relevant; asking about these reflects current clinical awareness. Lower weighting reflects supporting rather than primary diagnostic value.",xKo:"영아에서 백일해는 세기관지염과 유사하게 나타날 수 있으므로 예방접종이 완료 되지 않았다면 감별 진단에 포함해야 한다. 또한 니르세비맙이나 산모 RSV 백신과 같은 새로운 RSV 예방 전략도 점점 중요해지고 있으며, 이에 대해 질문하는 것은 최신 임상 지식을 반영한다. 다만 주요 진단 요소라기보다는 보조적 정보이므로 낮은 가중치를 부 여하였다."},
          {id:"3-1-1-6",pts:4,en:"Item 6. Social and Family History: Household composition, daycare/nursery attendance, household smokers, parental ability to monitor and return if worsening, distance from hospital, and family history of atopy/asthma.",ko:"항목 6. 사회력 및 가족력: 가족 구성, 어린이집/보육시설 이용 여부, 가정 내 흡연자, 증 상 악화 시 보호자가 관찰하고 재내원할 수 있는지 여부, 병원까지의 거리, 아토피/천식 의 가족력을 확인한다.",xEn:"Environmental tobacco smoke exposure worsens bronchiolitis severity. Daycare attendance increases infectious exposure risk. Family history of atopy may influence the likelihood of recurrent wheezing beyond the index episode. Crucially, the family's capacity for home monitoring and access to emergency care directly determines the safety of discharge in borderline cases.",xKo:"환경적 담배 연기 노출은 세기관지염의 중증도를 악화시킬 수 있다. 어린이집 이 용은 감염 노출 위험을 증가시킨다. 또한 아토피 가족력은 이후 반복적인 천명 발생 가 능성과 관련될 수 있다. 무엇보다 보호자가 가정에서 상태를 관찰하고 필요 시 병원에 접근할 수 있는지 여부는 경계 상황에서 안전한 퇴원 결정에 직접적인 영향을 미친다."},
          {id:"3-1-1-7",pts:3,en:"Item 7. Review of Systems: Targeted screening beyond the respiratory presentation — GI symptoms (vomiting, diarrhea), fever pattern, rash, irritability/consolability, and any urinary symptoms.",ko:"항목 7. 계통별 문진(Review of Systems): 호흡기 증상 외에도 위장관 증상(구토, 설사), 발열 양상, 발진, 보챔/달래짐 여부, 배뇨 증상 등을 선별적으로 확인한다.",xEn:"Concurrent viral gastroenteritis worsens dehydration risk. Unexplained irritability may suggest meningitis or intussusception as alternative diagnoses. Rash may point toward specific viral etiologies or Kawasaki disease in the right context. The review of systems serves as a safety net against diagnostic anchoring.",xKo:"동반된 바이러스성 위장관염은 탈수 위험을 증가시킬 수 있다. 원인을 설명하기 어려운 심한 보챔은 수막염이나 장중첩증과 같은 다른 질환을 시사할 수 있다. 발진은 특정 바이러스 감염이나 상황에 따라 가와사키병을 시사할 수 있다. 이러한 계통별 문진 은 특정 진단에 지나치게 고정되는 것을 방지하는 안전망 역할을 한다."},
          {id:"3-1-1-8",pts:2,en:"Item 8. Structured and Organized Approach: History obtained efficiently and logically, demonstrating appropriate urgency for a child in respiratory distress while remaining thorough.",ko:"항목 8. 체계적이고 조직적인 접근: 호흡곤란이 있는 영아 상황에 맞는 긴급성을 고려 하면서도 효율적이고 논리적인 순서로 병력을 청취한다.",xEn:"In an infant with active respiratory distress and hypoxemia, the clinician must balance the need for a complete history against the urgency of initiating supportive care. An excellent trainee obtains critical information quickly (risk factors, trajectory, feeding, urine output) while allowing concurrent assessment and management. This process marker reflects emergency-appropriate prioritization.",xKo:"호흡곤란과 저산소증이 있는 영아에서는 완전한 병력 청취와 즉각적인 지지 치료 시작 사이의 균형이 중요하다. 우수한 수련의는 위험 요인, 증상 진행 경과, 수유 상태, 소변량과 같은 핵심 정보를 신속히 파악하면서 동시에 평가와 처치를 병행한다. 이 항목 은 응급 상황에 적합한 우선순위 설정 능력을 반영하는 과정 평가 지표이다."},
        ],
        d2:[
          {id:"3-1-2-9",pts:12,en:"Item 9. Respiratory Trajectory and Illness Timeline: Detailed reconstruction of the illness course — prodromal symptoms, when breathing difficulty began, whether it is worsening/stable/improving, rapidity of deterioration, and current peak versus earlier severity.",ko:"항목 9. 호흡기 증상 진행 경과 및 질병 시간 경과: 전구 증상, 호흡곤란이 시작된 시점, 증상이 악화되는지/안정적인지/호전되는지, 악화 속도, 현재 상태가 이전보다 가장 심한 상태인지 등을 포함하여 질병 경과를 상세히 재구성한다.",xEn:"This is the most important historical element in this case. Bronchiolitis typically peaks at days 3–5 of illness; an infant at day 2 with moderate distress is likely still deteriorating, which has direct implications for disposition and anticipated resource needs. Rapid deterioration raises concern for complications (bacterial superinfection, pneumothorax) or alternative diagnoses. An infant already past peak who is improving may be a safer candidate for observation. This receives the highest individual weighting because it anchors the clinical decision-making framework.",xKo:"이 사례에서 가장 중요한 병력 요소이다. 세기관지염은 일반적으로 질병 발생 후 3–5일째에 증상이 가장 심해지며, 질병 2일째에 중등도 호흡곤란이 있는 영아는 아직 상태가 더 악화될 가능성이 높다. 이는 처치 결정과 필요한 의료 자원 예측에 직접적인 영향을 미친다. 급격한 악화는 세균성 중복 감염, 기흉 또는 다른 진단 가능성을 시사할 수 있다. 반대로 이미 증상 정점을 지나 호전 중인 영아는 관찰 후 귀가가 더 안전할 수 있다. 이러한 이유로 임상 의사결정의 기준이 되는 핵심 요소로서 가장 높은 개별 가중 치를 부여하였다."},
          {id:"3-1-2-10",pts:12,en:"Item 10. Feeding Assessment: Detailed inquiry into type of feeding (breast/bottle/solids), baseline intake volume and frequency, current intake (volume per feed, proportion of usual intake), feeding duration and effort, choking/gagging/coughing with feeds, and time of last adequate feed.",ko:"항목 10. 수유 상태 평가: 수유 방식(모유/젖병/이유식), 평소 섭취량과 빈도, 현재 섭취 량(회당 섭취량, 평소 대비 비율), 수유 시간과 노력 정도, 수유 중 질식·구역·기침 여부, 마지막으로 충분히 수유한 시점을 상세히 확인한다.",xEn:"Feeding ability is the most reliable proxy for respiratory reserve in an infant with bronchiolitis. An infant who can only take 50% of usual feeds is working too hard to breathe to coordinate suck-swallowbreathe. This is a primary determinant of admission versus discharge in every bronchiolitis guideline. The detailed quantification — not just \"feeding less\" but how much less, for how long, with what effort — separates adequate from excellent history-taking. Equal highest weighting reflects its direct and immediate management impact.",xKo:"세기관지염이 있는 영아에서 수유 능력은 호흡 예비력을 가장 잘 반영하는 지표이 다. 평소의 50% 정도만 수유할 수 있는 영아는 빨기-삼키기-호흡을 동시에 조절하기에 호흡 부담이 너무 큰 상태일 가능성이 높다. 이는 모든 세기관지염 진료 지침에서 입원 여부를 결정하는 주요 기준이다. 단순히 “수유가 줄었다”는 수준이 아니라 얼마나 줄었 는지, 얼마나 오래 지속되었는지, 어떤 노력으로 수유하는지를 정량적으로 확인하는 것 이 우수한 병력 청취의 기준이 된다. 이러한 요소가 처치 결정에 직접적이고 즉각적인 영향을 미치므로 가장 높은 가중치를 부여하였다."},
          {id:"3-1-2-11",pts:8,en:"Item 11. Hydration and Output Assessment: Wet diaper count over the preceding 12–24 hours compared to baseline, urine color if noted, tears when crying, and overall fluid balance estimation.",ko:"항목 11. 수분 상태 및 배설량 평가: 지난 12–24시간 동안의 젖은 기저귀 수를 평소와 비교하여 확인하고, 소변 색 변화가 있었는지, 울 때 눈물이 나는지, 전반적인 체액 균형 상태를 평가한다.",xEn:"Dehydration from reduced intake compounded by increased insensible losses from tachypnea is a common and dangerous complication of bronchiolitis. The finding of only one wet diaper since morning indicates significant reduction in output. This directly informs the need for IV or nasogastric fluid supplementation and contributes to admission criteria. High weighting reflects direct management relevance.",xKo:"세기관지염에서는 섭취 감소와 빈호흡으로 인한 불감 수분 손실 증가가 동시에 발 생하여 탈수가 흔하고 위험한 합병증이 될 수 있다. 이 사례에서처럼 아침 이후 젖은 기 저귀가 한 번뿐이라는 것은 배설량이 크게 감소했음을 시사한다. 이는 정맥 또는 비위관 수액 보충 필요 여부를 판단하고 입원 기준을 결정하는 데 직접적인 영향을 미친다. 따 라서 치료 결정과의 직접적인 관련성을 반영하여 높은 가중치를 부여하였다."},
          {id:"3-1-2-12",pts:8,en:"Item 12. Apnea and Acute Life-Threatening Event Screening: Direct questioning about witnessed pauses in breathing, color changes (pallor, cyanosis, dusky episodes), limpness or unresponsiveness, choking episodes, and any events requiring stimulation to resume breathing.",ko:"항목 12. 무호흡 및 급성 생명 위협 사건 선별: 보호자가 목격한 호흡 정지, 색 변화(창 백, 청색증, 검붉은 색 변화), 축 늘어짐 또는 반응 저하, 질식 에피소드, 호흡을 다시 시 작시키기 위해 자극이 필요했던 사건이 있었는지 직접적으로 질문한다.",xEn:"Apnea is the most feared complication of bronchiolitis in young infants and is an absolute indication for admission with continuous monitoring. Caregivers may not spontaneously volunteer subtle apneic episodes or may describe them as \"funny breathing\" or \"going quiet.\" Active, directed questioning is essential — this is a question that must be asked in every case. High weighting reflects its critical safety importance despite the fact that this infant is 8 months (lower apnea risk than neonates).",xKo:"무호흡은 어린 영아에서 세기관지염의 가장 우려되는 합병증이며, 발생 시 지속적 인 모니터링을 위한 입원의 절대적 적응증이 된다. 보호자는 미묘한 무호흡 에피소드를 자발적으로 보고하지 않거나 “이상한 호흡” 또는 “조용해짐”으로 표현할 수 있다. 따라 서 적극적이고 구체적인 질문이 필수적이며, 모든 사례에서 반드시 확인해야 하는 항목 이다. 이 영아가 8개월로 신생아보다 무호흡 위험이 낮더라도 환자 안전상 매우 중요한 요소이므로 높은 가중치를 부여하였다."},
          {id:"3-1-2-13",pts:5,en:"Item 13. Epidemiological Context: Sick contacts (particularly the older sibling's illness timeline and symptoms), nursery/daycare outbreaks, seasonality awareness, and exposure to known RSV or influenza cases.",ko:"항목 13. 역학적 배경: 아픈 접촉자(특히 형제자매의 증상과 발생 시점), 어린이집/보육 시설 내 집단 발생 여부, 계절적 유행 인식, RSV 또는 인플루엔자 환자와의 접촉 여부를 확인한다.",xEn:"An older sibling with a recent cold is highly typical for RSV household transmission and strongly supports the clinical diagnosis. Understanding the contact's illness timeline helps estimate where the infant is in the disease course. Nursery outbreaks may identify the circulating pathogen. This is diagnostically supportive rather than managementaltering, warranting moderate weight.",xKo:"최근 감기 증상이 있었던 형제자매는 RSV의 가정 내 전파에서 매우 흔한 양상이 며 임상적 진단을 강하게 지지한다. 접촉자의 질병 발생 시점을 이해하면 영아가 질병 경과 중 어느 단계에 있는지 추정하는 데 도움이 된다. 어린이집 집단 발생은 유행 중인 병원체를 파악하는 단서가 될 수 있다. 다만 이는 진단을 보조하는 정보로, 치료 결정을 직접적으로 바꾸는 요소는 아니므로 중간 수준의 가중치를 부여하였다."},
          {id:"3-1-2-14",pts:7,en:"Item 14. Risk Factor Identification for Severe Bronchiolitis: Specific inquiry into prematurity (<37 weeks), age <3 months, low birth weight, chronic lung disease, congenital heart disease, neuromuscular disease, immunodeficiency, and Down syndrome.",ko:"항목 14. 중증 세기관지염 위험 요인 확인: 미숙아 출생(<37주), 연령 <3개월, 저체중 출생, 만성 폐질환, 선천성 심장 질환, 신경근 질환, 면역결핍, 다운증후군 여부를 구체 적으로 확인한다.",xEn:"While partially overlapping with PMH, this item specifically evaluates whether the clinician systematically screens for established risk factors for severe bronchiolitis as a deliberate clinical reasoning step. Guidelines (AAP, NICE, CPS) identify these risk factors as key determinants of management intensity. A clinician who asks \"was the baby born early?\" as part of risk stratification demonstrates case-specific reasoning beyond routine history-taking. Substantial weighting reflects guideline-level importance.",xKo:"일부 항목은 과거 병력과 겹치지만, 이 항목은 임상의가 중증 세기관지염의 확립 된 위험 요인을 체계적으로 선별하는지를 평가한다. AAP, NICE, CPS 등의 진료 지침 에서는 이러한 위험 요인을 치료 강도와 처치 결정을 좌우하는 핵심 요소로 제시한다. 예를 들어 “아기가 미숙아로 태어났나요?”와 같은 질문을 위험도 평가 과정에서 명확히 하는 것은 단순한 병력 청취를 넘어 사례 특이적 임상 추론을 보여준다. 이러한 지침 수 준의 중요성을 반영하여 비교적 높은 가중치를 부여하였다."},
          {id:"3-1-2-15",pts:4,en:"Item 15. Environmental and Home Factors Relevant to Respiratory Illness: Household tobacco smoke exposure, use of wood-burning stoves or incense, pets, mold or damp housing conditions, and number of household members.",ko:"항목 15. 호흡기 질환과 관련된 환경 및 가정 요인: 가정 내 담배 연기 노출, 장작 난로 또는 향 사용, 반려동물, 곰팡이 또는 습한 주거 환경, 가구 구성원 수 등을 확인한다.",xEn:"Environmental smoke exposure is an established risk factor for bronchiolitis severity and recurrent wheezing. Overcrowded households increase transmission risk. These factors are modifiable and their identification contributes to both acute management context and discharge counseling. Moderate weighting reflects contributing rather than primary importance.",xKo:"환경적 담배 연기 노출은 세기관지염의 중증도와 반복적인 천명의 위험을 높이는 것으로 알려져 있다. 또한 가구 구성원이 많은 환경은 감염 전파 위험을 증가시킨다. 이 러한 요인들은 수정 가능한 요소이며, 이를 확인하는 것은 급성 관리 맥락을 이해하고 퇴원 시 교육 및 예방 상담에 도움을 준다. 주요 결정 요인이라기보다는 기여 요인이므 로 중간 수준의 가중치를 부여하였다."},
          {id:"3-1-2-16",pts:5,en:"Item 16. Differential Diagnosis–Oriented Questioning: Targeted questions to exclude foreign body aspiration (sudden onset, choking event, witnessed aspiration), cardiac failure (diaphoresis with feeding, failure to thrive, known murmur), pertussis (paroxysmal cough, post-tussive emesis, apnea without prodrome), and pneumonia (high persistent fever, focal symptoms, toxic appearance).",ko:"항목 16. 감별 진단을 위한 질문: 이물 흡인(갑작스러운 발병, 질식 사건, 목격된 흡인), 심부전(수유 시 발한, 성장 부진, 알려진 심잡음), 백일해(발작적 기침, 기침 후 구토, 전 구 증상 없는 무호흡), 폐렴(지속적인 고열, 국소 증상, 중독성 외관)을 배제하기 위한 표 적 질문을 한다.",xEn:"While the clinical picture is classic for bronchiolitis, the competent clinician must actively consider and exclude mimics. Foreign body aspiration can present identically in this age group and is a timecritical diagnosis. Undiagnosed congenital heart disease may present for the first time during a respiratory illness when the additional demand overwhelms marginal cardiac reserve. Asking about sudden onset, choking episodes, diaphoresis with feeding, and growth trajectory reflects mature diagnostic reasoning.",xKo:"임상 양상이 세기관지염에 전형적이더라도 유능한 임상의는 유사 질환을 적극적 으로 고려하고 배제해야 한다. 이물 흡인은 이 연령대에서 동일한 증상으로 나타날 수 있으며 시간에 민감한 진단이다. 또한 진단되지 않은 선천성 심장 질환은 호흡기 질환으 로 인해 심장 예비력이 한계에 도달하면서 처음으로 나타날 수 있다. 갑작스러운 발병 여부, 질식 에피소드, 수유 시 발한, 성장 경과 등을 질문하는 것은 성숙한 임상적 추론 을 반영한다."},
          {id:"3-1-2-17",pts:3,en:"Item 17. Sleep and Positional Factors: How the infant has been sleeping (position, duration, wakefulness), whether distress worsens when supine, and parental overnight observations of breathing pattern.",ko:"항목 17. 수면 및 체위 관련 요인: 영아가 어떻게 잠을 자고 있는지(자세, 수면 지속 시 간, 각성 여부), 바로 누웠을 때 호흡 곤란이 악화되는지, 밤 동안 보호자가 관찰한 호흡 양상에 대해 확인한다.",xEn:"Infants with bronchiolitis often worsen when supine due to increased nasal secretion pooling and airway narrowing. Parental reports of overnight worsening, frequent waking, or inability to lie flat provide valuable information about trajectory and severity that may not be apparent during a daytime emergency department snapshot. Lower weighting reflects supplementary value.",xKo:"세기관지염이 있는 영아는 비강 분비물의 축적과 기도 협착 증가로 인해 바로 누 운 자세에서 증상이 악화되는 경우가 많다. 밤 동안 증상이 악화되었는지, 자주 깨는지, 바로 누워 있지 못하는지에 대한 보호자의 관찰은 낮 시간 응급실 평가에서는 드러나지 않을 수 있는 질병의 경과와 중증도를 파악하는 데 중요한 단서를 제공한다. 다만 보조 적인 정보이므로 낮은 가중치를 부여하였다."},
        ],
      },
      {
        id:"3-2", label_en:"Rubric 2", label_ko:"기준표 2", d1pts:50, d2pts:50,
        d1desc_en:"This domain evaluates core history-taking skills applicable across all pediatric emergency presentations.",
        d1desc_ko:"이 영역은 모든 소아 응급 상황에 적용 가능한 핵심 병력 청취 기술을 평가합니다.",
        d2desc_en:"This domain evaluates case-specific diagnostic history for RSV bronchiolitis.",
        d2desc_ko:"이 영역은 RSV 세기관지염에 대한 사례 특이적 진단 병력을 평가합니다.",
        d1:[
          {id:"3-2-1-1",pts:5,en:"Item 1. Chief Complaint: Clearly elicits and articulates the primary presenting problem(s) in patient's/family's own words.",ko:"항목 1. 주 호소: 환자/보호자의 표현 그대로 주요 호소 문제를 명확히 확인하고 기술한 다.",xEn:"Establishes encounter focus; foundational and routinely expected, modest weight.",xKo:"진료의 초점을 설정하는 기본 단계로, 모든 병력 청취의 기초가 되는 항목이다. 일 반적으로 항상 수행되는 요소이므로 비교적 낮은 가중치를 부여하였다."},
          {id:"3-2-1-2",pts:12,en:"Item 2. History of Presenting Illness: Systematically explores onset, timing, duration, severity, progression, aggravating/alleviating factors, and associated symptoms using a structured approach (e.g., OPQRST).",ko:"항목 2. 현병력: 발병 시점, 시간 경과, 지속 기간, 중증도, 진행 양상, 악화/완화 요인, 동반 증상을 구조화된 접근법(예: OPQRST)을 사용하여 체계적으로 탐색한다.",xEn:"Captures illness trajectory for urgency in pediatric EM; core to all differentials, highest general weight.",xKo:"소아 응급의학에서 질환의 경과와 악화 속도를 파악하는 핵심 요소이며, 모든 감 별 진단의 중심이 되는 정보이다. 일반 병력 항목 중 가장 높은 가중치를 부여하였다."},
          {id:"3-2-1-3",pts:7,en:"Item 3. Past Medical History: Inquires about chronic illnesses, prior hospitalizations, surgeries, birth/developmental history, and previous similar episodes.",ko:"항목 3. 과거 병력: 만성 질환, 이전 입원 또는 수술, 출생 및 발달 병력, 이전에 유사한 증상이 있었는지 여부를 확인한다.",xEn:"Identifies risks or patterns affecting management; moderate for baseline stratification.",xKo:"치료 계획에 영향을 줄 수 있는 위험 요인이나 질환 패턴을 파악하는 데 중요하며, 기본적인 위험도 평가를 위해 중간 수준의 가중치를 부여하였다."},
          {id:"3-2-1-4",pts:4,en:"Item 4. Medications: Documents current prescriptions, over-the-counter drugs, recent antibiotics, and adherence.",ko:"항목 4. 복용 약물: 현재 처방약, 일반의약품, 최근 항생제 사용 여부, 복약 순응도를 확 인한다.",xEn:"Guides therapy and avoids interactions; straightforward, low weight.",xKo:"치료 계획 수립과 약물 상호작용 예방에 도움을 주는 기본적인 항목으로, 비교적 단순한 정보이므로 낮은 가중치를 부여하였다."},
          {id:"3-2-1-5",pts:4,en:"Item 5. Allergies: Asks about drug/food allergies, adverse reactions, and anaphylaxis history.",ko:"항목 5. 알레르기: 약물 또는 음식 알레르기, 이상 반응, 아나필락시스 병력을 확인한다.",xEn:"Ensures prescribing safety; low weight paired with medications.",xKo:"처방의 안전성을 보장하기 위한 필수 확인 사항이며, 복용 약물 항목과 함께 낮은 가중치를 부여하였다."},
          {id:"3-2-1-6",pts:4,en:"Item 6. Immunizations: Confirms status, recent vaccines, and gaps relevant to infectious risks.",ko:"항목 6. 예방접종: 예방접종 상태, 최근 접종 여부, 감염 위험과 관련된 미접종 여부를 확인한다.",xEn:"Critical in pediatrics for context; low as often documented.",xKo:"소아 진료에서 중요한 배경 정보이지만, 대부분 이미 기록되어 있는 경우가 많아 낮은 가중치를 부여하였다."},
          {id:"3-2-1-7",pts:5,en:"Item 7. Family History: Explores hereditary conditions and relevant familial illnesses.",ko:"항목 7. 가족력: 유전 질환 및 관련 있는 가족 내 질환 여부를 확인한다.",xEn:"Uncovers genetic risks; pediatric-relevant, moderate weight.",xKo:"유전적 위험 요인을 파악하는 데 중요하며, 소아 환자에서 특히 의미가 있어 중간 수준의 가중치를 부여하였다."},
          {id:"3-2-1-8",pts:4,en:"Item 8. Social History: Assesses home environment, caregivers, school/daycare/nursery exposure, and habits.",ko:"항목 8. 사회력: 가정 환경, 보호자, 학교/어린이집/보육시설 노출, 생활 습관 등을 확인 한다.",xEn:"Contextualizes adherence/exposures; supportive, low weight.",xKo:"치료 순응도와 감염 노출 등의 맥락을 이해하는 데 도움이 되는 보조적 정보이므 로 낮은 가중치를 부여하였다."},
          {id:"3-2-1-9",pts:5,en:"Item 9. Review of Systems: Performs age-appropriate screening for unrelated symptoms.",ko:"항목 9. 계통별 문진: 연령에 맞게 관련 없는 증상에 대해서도 선별적으로 확인한다.",xEn:"Safety net for comorbidities; moderate for comprehensiveness.",xKo:"동반 질환이나 다른 문제를 놓치지 않기 위한 안전망 역할을 하며, 전반적인 평가 의 완전성을 위해 중간 수준의 가중치를 부여하였다."},
        ],
        d2:[
          {id:"3-2-2-10",pts:12,en:"Item 10. Respiratory Symptoms: Details rhinorrhea, cough quality/duration, progression to distress (tachypnea, retractions, flaring, wheeze), and prior respiratory episodes.",ko:"항목 10. 호흡기 증상: 콧물, 기침의 양상과 지속 기간, 호흡곤란으로의 진행(빈호흡, 함몰 호흡, 비익 확장, 천명), 이전 호흡기 증상 여부를 상세히 확인한다.",xEn:"Core to bronchiolitis diagnosis and severity scoring (e.g., RDAI); highest weight for guiding respiratory support.",xKo:"세기관지염의 진단과 중증도 평가(예: RDAI)에 핵심적인 요소이며, 호흡기 보조 치료 필요 여부를 결정하는 데 직접적인 영향을 미친다. 따라서 가장 높은 가중치를 부 여하였다."},
          {id:"3-2-2-11",pts:12,en:"Item 11. Feeding and Hydration Status: Probes oral intake volume/frequency, wet diapers/urine output, feeding refusal, and dehydration signs (tears, activity).",ko:"항목 11. 수유 및 수분 상태: 경구 섭취량과 빈도, 젖은 기저귀/소변 배출량, 수유 거부 여부, 탈수 징후(눈물, 활동성 등)를 확인한다.",xEn:"Critical in infants for dehydration/hypoglycemia risk; high weight drives fluid management and admission.",xKo:"영아에서 탈수와 저혈당 위험을 평가하는 데 매우 중요하며, 수액 치료와 입원 여 부를 결정하는 핵심 요소이므로 높은 가중치를 부여하였다."},
          {id:"3-2-2-12",pts:10,en:"Item 12. Exposure History: Inquires about sick contacts (siblings/nursery), recent upper respiratory illnesses, and seasonality.",ko:"항목 12. 노출력: 아픈 접촉자(형제자매/어린이집), 최근 상기도 감염, 계절적 유행 여 부를 확인한다.",xEn:"Confirms viral etiology (RSV); substantial for targeted testing and isolation.",xKo:"바이러스성 원인(RSV)을 확인하는 데 도움이 되며, 검사 선택과 격리 조치에 중 요한 정보를 제공하므로 비교적 높은 가중치를 부여하였다."},
          {id:"3-2-2-13",pts:8,en:"Item 13. Red Flag Screening: Explores apnea, cyanosis episodes, high fever, grunting, or lethargy to exclude alternatives.",ko:"항목 13. 위험 신호 선별: 무호흡, 청색증 에피소드, 고열, 신음 호흡(grunting), 무기 력 여부를 확인하여 다른 질환 가능성을 배제한다.",xEn:"Rules out pertussis, cardiac disease, or bacterial pneumonia; key for disposition safety.",xKo:"백일해, 심장 질환, 세균성 폐렴 등의 가능성을 배제하기 위한 중요한 단계이며, 안전한 처치 결정과 환자 배치에 핵심적인 역할을 하므로 높은 가중치를 부여하였다."},
          {id:"3-2-2-14",pts:5,en:"Item 14. Environmental Risks: Assesses secondhand smoke, allergens, or home irritants.",ko:"항목 14. 환경적 위험 요인: 간접흡연, 알레르겐, 가정 내 자극 물질 노출 여부를 확인한 다.",xEn:"Modifiable factors worsening bronchiolitis; moderate for prevention counseling.",xKo:"이러한 요인은 세기관지염을 악화시킬 수 있는 수정 가능한 요소로, 예방 및 퇴원 후 상담에 중요하므로 중간 수준의 가중치를 부여하였다."},
          {id:"3-2-2-15",pts:3,en:"Item 15. Cardiac/Atopy History: Screens for congenital heart disease symptoms or personal/family atopy/asthma.",ko:"항목 15. 심장 질환 및 아토피 병력: 선천성 심장 질환 관련 증상 여부와 개인 또는 가 족의 아토피/천식 병력을 확인한다.",xEn:"Differentiates from wheezy mimics; lower weight as less common but confirmatory.",xKo:"천명이 동반되는 다른 질환과의 감별에 도움이 되는 정보이며, 비교적 드물고 보 조적인 확인 요소이므로 낮은 가중치를 부여하였다."},
        ],
      },
      {
        id:"3-3", label_en:"Rubric 3", label_ko:"기준표 3", d1pts:40, d2pts:60,
        d1desc_en:"This domain evaluates the candidate's ability to obtain a complete, structured general clinical history applicable to any pediatric emergency presentation.",
        d1desc_ko:"이 영역은 모든 소아 응급 상황에 적용 가능한 완전하고 구조화된 일반 임상 병력을 청취하는 능력을 평가합니다.",
        d2desc_en:"This domain evaluates case-specific diagnostic history for infant bronchiolitis.",
        d2desc_ko:"이 영역은 영아 세기관지염에 대한 사례 특이적 진단 병력을 평가합니다.",
        d1:[
          {id:"3-3-1-1",pts:8,en:"Item 1. Establishes Chief Concern and Symptom Timeline: Clearly defines onset and progression of rhinorrhea, cough, increased work of breathing, and feeding decline; clarifies sequence (URI symptoms preceding respiratory distress).",ko:"항목 1. 주 호소 및 증상 경과 확인: 콧물, 기침, 호흡곤란 증가, 수유 감소의 발병 시점 과 진행 양상을 명확히 확인하고, 상기도 감염 증상 이후 호흡 곤란이 발생한 순서를 파 악한다.",xEn:"Temporal progression from upper respiratory symptoms to lower airway involvement is classic for bronchiolitis and supports diagnostic reasoning.",xKo:"상기도 감염 증상에서 하기도 침범으로 진행되는 시간적 경과는 세기관지염의 전 형적인 양상이며, 임상적 진단 추론을 뒷받침하는 중요한 근거가 된다."},
          {id:"3-3-1-2",pts:8,en:"Item 2. Characterizes Respiratory Symptoms in Detail: Explores cough quality, wheeze, noisy breathing, grunting, retractions, apnea episodes, cyanosis, and sleep disturbance.",ko:"항목 2. 호흡기 증상 상세 평가: 기침의 양상, 천명, 거친 호흡음, 신음 호흡, 함몰 호흡, 무호흡 에피소드, 청색증, 수면 장애 여부를 확인한다.",xEn:"Detailed respiratory characterization helps assess severity and distinguish bronchiolitis from asthma, pneumonia, or foreign body aspiration.",xKo:"호흡기 증상을 구체적으로 평가하면 중증도를 판단하고 세기관지염을 천식, 폐렴, 이물 흡인 등과 감별하는 데 도움이 된다."},
          {id:"3-3-1-3",pts:6,en:"Item 3. Assesses Feeding and Hydration Status: Quantifies oral intake (percentage of usual feeds), duration of feeds, fatigue with feeding, number of wet diapers, emesis with coughing.",ko:"항목 3. 수유 및 수분 상태 평가: 경구 섭취량(평소 수유량 대비 비율), 수유 시간, 수유 시 피로 여부, 젖은 기저귀 수, 기침과 동반된 구토 여부를 확인한다.",xEn:"In infants, feeding tolerance is a key marker of respiratory compromise and admission need.",xKo:"영아에서는 수유 가능 여부가 호흡기 기능 저하를 평가하는 중요한 지표이며, 입 원 필요성을 판단하는 데 핵심적인 요소이다."},
          {id:"3-3-1-4",pts:6,en:"Item 4. Screens for Red-Flag Symptoms: Specifically asks about apnea, cyanosis, lethargy, poor responsiveness, persistent hypoxia, or signs of exhaustion.",ko:"항목 4. 위험 신호 선별: 무호흡, 청색증, 무기력, 반응 저하, 지속적인 저산소증, 탈진 징후가 있는지 구체적으로 확인한다.",xEn:"Early recognition of impending respiratory failure is critical in infants.",xKo:"영아에서 임박한 호흡부전을 조기에 인지하는 것은 매우 중요하다."},
          {id:"3-3-1-5",pts:5,en:"Item 5. Past Medical and Birth History: Elicits prematurity, chronic lung disease, congenital heart disease, prior NICU stay, prior wheezing episodes.",ko:"항목 5. 과거 병력 및 출생 병력: 미숙아 출생 여부, 만성 폐질환, 선천성 심장 질환, 과 거 NICU 입원, 이전 천명 에피소드 여부를 확인한다.",xEn:"Comorbidities significantly increase risk of severe RSV disease and influence disposition.",xKo:"이러한 동반 질환은 중증 RSV 질환의 위험을 크게 증가시키며, 처치 결정과 환자 배치에 영향을 미친다."},
          {id:"3-3-1-6",pts:2,en:"Item 6. Medication and Allergy History: Identifies prior bronchodilator use, steroid exposure, or medication reactions.",ko:"항목 6. 약물 및 알레르기 병력: 이전 기관지확장제 사용, 스테로이드 노출 여부, 약물 이상 반응을 확인한다.",xEn:"Helps distinguish recurrent wheeze/asthma phenotype and informs management decisions.",xKo:"반복적인 천명이나 천식 표현형을 구분하는 데 도움이 되며 치료 결정에 참고가 된다."},
          {id:"3-3-1-7",pts:3,en:"Item 7. Immunization and Prophylaxis History: Confirms routine vaccines and asks about RSV monoclonal prophylaxis (if eligible).",ko:"항목 7. 예방접종 및 예방요법 병력: 정기 예방접종 여부를 확인하고, 대상이 되는 경우 RSV 단클론 항체 예방요법을 받았는지 확인한다.",xEn:"High-risk infants may have received RSV prophylaxis; vaccination status contributes to overall infectious risk profile.",xKo:"고위험 영아는 RSV 예방요법을 받았을 수 있으며, 예방접종 상태는 전반적인 감 염 위험 평가에 도움이 된다."},
          {id:"3-3-1-8",pts:2,en:"Item 8. Social and Exposure History: Assesses sick contacts, daycare attendance, smoke exposure, and household crowding.",ko:"항목 8. 사회력 및 노출력: 아픈 접촉자 여부, 어린이집/보육시설 이용, 간접흡연 노출, 가정 내 밀집 거주 여부를 확인한다.",xEn:"Supports viral etiology and identifies modifiable environmental risk factors.",xKo:"바이러스성 원인을 뒷받침하고 수정 가능한 환경적 위험 요인을 확인하는 데 도움 이 된다."},
        ],
        d2:[
          {id:"3-3-2-9",pts:12,en:"Item 9. Assesses Severity of Work of Breathing: Specifically evaluates retractions (subcostal/intercostal/suprasternal), nasal flaring, grunting, head bobbing, ability to vocalize/cry, and progression over hours.",ko:"항목 9. 호흡 노력의 중증도 평가: 함몰 호흡(늑하/늑간/흉골상), 비익 확장, 신음 호흡, 머리 흔들림(head bobbing), 울거나 소리를 낼 수 있는지 여부, 수시간 동안의 악화 또 는 변화 여부를 평가한다.",xEn:"Work of breathing directly determines need for oxygen, highflow therapy, or ICU admission.",xKo:"호흡 노력의 정도는 산소 치료, 고유량 산소 요법, 또는 중환자실 입원 필요성을 결정하는 핵심 요소이다."},
          {id:"3-3-2-10",pts:10,en:"Item 10. Screens for Apnea Risk: Asks about witnessed pauses in breathing, color change, limpness, particularly in young infants or during sleep.",ko:"항목 10. 무호흡 위험 선별: 특히 어린 영아나 수면 중에 관찰된 호흡 정지, 색 변화, 축 늘어짐 여부에 대해 확인한다.",xEn:"Apnea is a serious bronchiolitis complication, especially in infants <6 months; high clinical priority.",xKo:"무호흡은 세기관지염의 심각한 합병증이며, 특히 6개월 미만 영아에서 위험이 높 아 임상적으로 매우 중요한 평가 요소이다."},
          {id:"3-3-2-11",pts:8,en:"Item 11. Evaluates Oxygenation and Clinical Deterioration: Clarifies prior cyanosis, home pulse oximeter readings (if available), worsening tachypnea, or fatigue.",ko:"항목 11. 산소화 상태 및 임상 악화 평가: 이전에 청색증이 있었는지, 가정용 산소포화 도 측정기 수치가 있었는지(있는 경우), 빈호흡 악화 여부, 피로 또는 탈진 징후를 확인 한다.",xEn:"Hypoxemia and fatigue indicate escalating respiratory failure risk.",xKo:"저산소혈증과 피로는 진행되는 호흡부전의 위험을 시사한다."},
          {id:"3-3-2-12",pts:8,en:"Item 12. Quantifies Feeding Compromise and Aspiration Risk: Assesses choking, coughing with feeds, reduced intake (<50% usual), dehydration markers, and coordination of suck–swallow–breath.",ko:"항목 12. 수유 저하 및 흡인 위험 평가: 수유 중 질식이나 기침 여부, 섭취량 감소(평소 의 50% 미만), 탈수 징후, 빨기–삼키기–호흡의 협응 상태를 확인한다.",xEn:"Poor feeding both reflects severity and increases risk of dehydration and aspiration.",xKo:"수유 저하는 질병의 중증도를 반영할 뿐 아니라 탈수와 흡인 위험을 증가시킨다."},
          {id:"3-3-2-13",pts:8,en:"Item 13. Identifies High-Risk Conditions for Severe RSV: Specifically screens for prematurity (<35 weeks), chronic lung disease, congenital heart disease, neuromuscular weakness, immunodeficiency.",ko:"항목 13. 중증 RSV 위험 요인 확인: 미숙아 출생(<35주), 만성 폐질환, 선천성 심장 질환, 신경근 약화, 면역결핍 여부를 구체적으로 확인한다.",xEn:"These factors strongly influence admission threshold and monitoring intensity.",xKo:"이러한 요인들은 입원 결정 기준과 모니터링 강도에 큰 영향을 미친다."},
          {id:"3-3-2-14",pts:6,en:"Item 14. Differentiates from Alternative Diagnoses: Screens for sudden onset (foreign body), focal pneumonia symptoms, prior recurrent wheeze (early asthma), toxic appearance (bacterial infection).",ko:"항목 14. 다른 진단과의 감별: 갑작스러운 발병(이물 흡인), 국소 폐렴 증상, 이전 반복 적인 천명(초기 천식), 중독성 외관(세균 감염)을 확인한다.",xEn:"Prevents misdiagnosis and ensures competing lifethreatening etiologies are excluded.",xKo:"오진을 예방하고 생명을 위협할 수 있는 다른 원인을 배제하기 위한 중요한 단계 이다."},
          {id:"3-3-2-15",pts:4,en:"Item 15. Assesses Hydration and Urine Output: Clarifies number of wet diapers in 24 hours and signs of dehydration.",ko:"항목 15. 수분 상태 및 소변량 평가: 지난 24시간 동안의 젖은 기저귀 수와 탈수 징후를 확인한다.",xEn:"Dehydration is a common complication and influences IV vs NG fluid decisions.",xKo:"탈수는 흔한 합병증이며, 정맥 수액 또는 비위관 수액 투여 여부 결정에 영향을 미 친다."},
          {id:"3-3-2-16",pts:4,en:"Item 16. Reviews Home Management and Response to Interventions: Asks about nasal suctioning, humidification, prior ED visits, or trial of bronchodilators and response.",ko:"항목 16. 가정 내 관리 및 처치 반응 확인: 비강 흡인, 가습 사용 여부, 이전 응급실 방 문, 기관지확장제 사용 시도 및 그 반응 여부를 확인한다.",xEn:"Understanding response to supportive care helps gauge trajectory and severity.",xKo:"지지적 치료에 대한 반응을 이해하면 질병의 경과와 중증도를 평가하는 데 도움이 된다."},

      {
        id:"3-4", label_en:"Rubric 4", label_ko:"기준표 4", d1pts:40, d2pts:60,
        threshold_en:"Pass Threshold: 70/100. A score of 0 on Item 2.1 (Apnea Screen) or Item 2.2 (Hydration/Feeding) is a critical fail due to patient safety risks.",
        threshold_ko:"합격 기준: 70점. 항목 2.1 (무호흡 선별) 또는 항목 2.2 (수분/수유 상태)에서 0점을 받을 경우 환자 안전 위험으로 인해 치명적 실패(Critical Fail)로 간주됨.",
        d1desc_en:"This domain evaluates the candidate's ability to structure the interview, build rapport with anxious caregivers, and gather standard medical context applicable to any pediatric admission.",
        d1desc_ko:"이 영역은 응시자의 면담 구조화 능력, 불안해하는 보호자와의 신뢰 형성 능력, 모든 소아 입원에 적용 가능한 표준 의학적 맥락 수집 능력을 평가합니다.",
        d2desc_en:"This domain evaluates the candidate's clinical reasoning for RSV bronchiolitis severity assessment.",
        d2desc_ko:"이 영역은 RSV 세기관지염 중증도 평가에 대한 응시자의 임상 추론 능력을 평가합니다.",
        d1:[
          {id:"3-4-1-1",pts:5,en:"Item 1. Introduction and Observation: Introduces self clearly to the caregivers. Simulatenously observes the infant’s position of comfort and general appearance (alert vs. lethargic) while talking to the parents.",ko:"항목 1. 소개 및 관찰: 보호자에게 자신을 명확히 소개한다. 동시에 보호자와 대화하는 동안 영아의 편안한 자세와 전반적인 상태(각성/무기력 등)를 관찰한다.",xEn:"In an infant with respiratory distress, the \"history\" begins with observation. Assessing if the child is trackable/alert while establishing rapport with the terrified parents is the foundation of the consult.",xKo:"호흡곤란이 있는 영아에서는 “병력 청취”가 관찰에서 시작된다. 보호자와 신뢰 관 계를 형성하는 동시에 아이가 시선 추적이 가능한지, 각성 상태인지 등을 평가하는 것이 진료의 기본이 된다."},
          {id:"3-4-1-2",pts:10,en:"Item 2. Chronology of Illness (HPI): Establishes the timeline of symptoms: onset of rhinorrhea (runny nose) vs. onset of respiratory distress. Specifically asks about the trajectory (is the breathing getting worse, staying the same, or improving?).",ko:"항목 2. 질병 경과의 시간적 흐름(현병력): 콧물(비루) 발생 시점과 호흡곤란 발생 시점 을 구분하여 증상의 시간적 경과를 확인한다. 특히 호흡 상태의 변화 양상(악화 중인지, 동일한지, 호전되는지)을 구체적으로 질문한다.",xEn:"Bronchiolitis typically peaks on day 3–5 of illness. Placing the patient on this timeline helps predict if they will deteriorate further or if they are in the recovery phase.",xKo:"세기관지염은 일반적으로 질병 발생 후 3–5일째에 증상이 가장 심해진다. 따라서 현재 환자가 질병 경과 중 어느 시점에 있는지를 파악하면 앞으로 악화될 가능성이 있는 지, 회복 단계에 있는지를 예측하는 데 도움이 된다."},
          {id:"3-4-1-3",pts:10,en:"Item 3. General Past Medical & Birth History: Asks about mode of delivery, complications at birth, and prior hospitalizations. — 10 points Disagree 비동의",ko:"항목 3. 전반적인 과거 병력 및 출생 병력: 분만 방식, 출생 시 합병증, 과거 입원 병력 여부를 확인한다.",xEn:"A general screen is necessary to identify unrelated but complicating factors (e.g., genetic syndromes, failure to thrive) that might lower the threshold for admission.",xKo:"전반적인 선별 질문은 입원 기준을 낮출 수 있는 관련 없는 동반 요인(예: 유전 증 후군, 성장 부진 등)을 확인하는 데 필요하다."},
          {id:"3-4-1-4",pts:10,en:"Item 4. Sick Contacts and Environmental History: Inquires about siblings (school/daycare), recent viral illnesses in the home, and specifically asks about second-hand smoke exposure.",ko:"항목 4. 아픈 접촉자 및 환경 병력: 형제자매(학교/어린이집 이용 여부), 가정 내 최근 바이러스성 질환 여부, 특히 간접흡연 노출 여부를 확인한다.",xEn:"Identifying the source (e.g., sibling with a \"cold\") supports the viral diagnosis. Smoke exposure is a proven predictor of severe bronchiolitis and increased need for respiratory support.",xKo:"감염 원인(예: 감기에 걸린 형제자매)을 확인하는 것은 바이러스성 질환 진단을 뒷 받침한다. 또한 간접흡연 노출은 세기관지염의 중증도 증가와 호흡 보조 치료 필요성 증 가와 관련된 것으로 알려져 있다."},
          {id:"3-4-1-5",pts:5,en:"Item 5. Medications and Allergies: Confirms no known drug allergies and asks about the use of home remedies or over-the-counter cough medications (which are contraindicated in this age group).",ko:"항목 5. 약물 및 알레르기 병력: 알려진 약물 알레르기가 없는지 확인하고, 가정에서 사 용한 민간요법이나 일반의약품 기침약(이 연령대에서는 금기일 수 있음) 사용 여부를 확 인한다.",xEn:"Safety check to ensure no toxicity from inappropriate home medications and to clear the way for potential in-hospital pharmacotherapy.",xKo:"부적절한 가정용 약물 사용으로 인한 독성 가능성을 확인하고, 병원 내 약물 치료 를 안전하게 시행할 수 있도록 하기 위한 안전 점검이다."},
        ],
        d2:[
          {id:"3-4-2-6",pts:15,en:"Item 6. Assessment of Respiratory Failure and Apnea: Specifically asks about apnea (pauses in breathing), cyanosis (blue discoloration around lips/face), and the nature of the \"work of breathing\" (e.g., belly breathing, head bobbing).",ko:"항목 6. 호흡부전 및 무호흡 평가: 무호흡(호흡 정지), 청색증(입술/얼굴 주변의 청색 변 화), 그리고 “호흡 노력”의 양상(예: 복식 호흡, 머리 흔들림)을 구체적으로 확인한다.",xEn:"Apnea is the most dangerous complication of RSV in infants under 6 months or former preemies. Missing a history of \"pauses in breathing\" is a critical safety failure.",xKo:"무호흡은 특히 6개월 미만 영아나 미숙아 출생 영아에서 RSV의 가장 위험한 합병 증이다. “호흡이 멈추는 것처럼 보였다”는 병력을 놓치는 것은 중대한 환자 안전 문제이 다."},
          {id:"3-4-2-7",pts:15,en:"Item 7. Hydration and Feeding Mechanics (\"The Work of Feeding\"): Quantifies wet diapers (output) and specific intake volume. Crucially, asks how the baby is feeding: \"Does he have to stop sucking to breathe?\" or \"Is he sweating/tiring during feeds?\"",ko:"항목 7. 수분 상태 및 수유 역학 평가(“수유 시 호흡 부담”): 젖은 기저귀 수(배설량)와 실제 섭취량을 정량적으로 확인한다. 특히 “아기가 숨을 쉬기 위해 빨기를 멈춰야 하나 요?” 또는 “수유 중에 땀을 흘리거나 쉽게 지치나요?”와 같이 수유 양상을 구체적으로 질문한다.",xEn:"In infants, feeding is their exercise stress test. Inability to coordinate suck-swallow-breathe due to tachypnea is the primary indication for admission for IV fluids/NG tube, often before hypoxia sets in. The vignette notes \"decreased intake\" and \"one wet diaper,\" making this a pivotal severity marker.",xKo:"영아에게 수유는 일종의 운동 부하 검사와 같다. 빈호흡으로 인해 빨기-삼키기-호 흡의 협응이 어려워지는 경우는 저산소증이 나타나기 전이라도 정맥 수액 또는 비위관 수액을 위해 입원을 결정하는 주요 기준이 된다. 이 사례에서 “섭취량 감소”와 “젖은 기 저귀 한 번”이 언급된 점을 고려할 때, 이는 중증도를 판단하는 핵심 지표이다."},
          {id:"3-4-2-8",pts:10,en:"Item 8. Risk Stratification (Prematurity and Cardiac Disease): Explicitly asks about gestational age at birth (prematurity) and history of congenital heart disease or chronic lung disease of prematurity.",ko:"항목 8. 위험도 평가(미숙아 및 심장 질환): 출생 시 재태 연령(미숙아 여부)과 선천성 심장 질환 또는 미숙아 관련 만성 폐질환 병력을 명확히 확인한다.",xEn:"\"Unremarkable PMH\" in the vignette needs to be actively confirmed. A 34-weeker or a baby with a small VSD handles RSV much more poorly than a full-term infant. This dictates the aggressiveness of monitoring.",xKo:"증례에서 “특이 과거력 없음”이라고 되어 있어도 이를 반드시 직접 확인해야 한 다. 예를 들어 34주 미숙아나 작은 심실중격결손(VSD)이 있는 영아는 만삭 영아보다 RSV 감염을 훨씬 더 심하게 겪을 수 있다. 이러한 정보는 모니터링과 치료의 적극성을 결정하는 데 중요한 요소이다."},
          {id:"3-4-2-9",pts:10,en:"Item 9. Differential Diagnosis Exclusion (Aspiration/Foreign Body): Asks about the onset of symptoms (sudden vs. gradual) and specifically asks about choking episodes prior to the start of distress.",ko:"항목 9. 감별 진단 배제(흡인/이물 흡인): 증상의 시작 양상(갑작스러운지 또는 점진적 인지)을 확인하고, 호흡곤란이 시작되기 전에 질식 에피소드가 있었는지 구체적으로 질 문한다.",xEn:"An 8-month-old is at the oral-exploration stage. A foreign body aspiration can mimic bronchiolitis (wheezing/distress). The clinician must ensure the distress wasn't precipitated by a choking event (e.g., a toy or food) to avoid missing a surgical emergency.",xKo:"8개월 영아는 구강 탐색 단계에 있어 이물 흡인의 위험이 높다. 이물 흡인은 천명 이나 호흡곤란 등 세기관지염과 유사한 증상을 보일 수 있다. 따라서 장난감이나 음식 등으로 인한 질식 사건이 호흡곤란의 원인이었는지 확인하여 수술적 응급 상황을 놓치 지 않도록 해야 한다."},
          {id:"3-4-2-10",pts:10,en:"Item 10. History of Atopy/Wheezing: Asks about personal history of eczema or family history of asthma/atopy. Asks if the child has wheezed before this episode.",ko:"항목 10. 아토피/천명 병력 확인: 개인의 습진 병력이나 가족의 천식/아토피 병력을 확 인하고, 이번 에피소드 이전에 천명이 있었는지 질문한다.",xEn:"While this is likely primary bronchiolitis, a strong family history of asthma or prior wheezing episodes suggests \"Viral Induced Wheeze\" or early asthma, which might respond to bronchodilators (Ventolin), whereas classic bronchiolitis generally does not. This guides the trial of therapy.",xKo:"이 사례는 일차성 세기관지염일 가능성이 높지만, 강한 가족력의 천식이나 이전 천명 에피소드가 있다면 “바이러스 유발 천명(Viral Induced Wheeze)” 또는 초기 천 식 가능성을 시사할 수 있다. 이러한 경우 기관지확장제(예: Ventolin)에 반응할 수 있 지만, 전형적인 세기관지염은 일반적으로 그렇지 않다. 따라서 치료 시도 여부와 방향을 결정하는 데 중요한 정보가 된다."},
